    <style>
        * {
            font-family: 'Poppins', sans-serif;
        }

        /* Ajuste de scrollbar para tema claro */
        .scrollbar-thin::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        .scrollbar-thin::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.03);
            border-radius: 10px;
        }

        .scrollbar-thin::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, 0.15);
            border-radius: 10px;
            border: 2px solid #F5F2E9;
        }

        .scrollbar-thin::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 0, 0, 0.25);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-5px);
            }

            75% {
                transform: translateX(5px);
            }
        }

        .animate-slideIn {
            animation: slideIn 0.3s ease-out;
        }

        .animate-pulse-custom {
            animation: pulse 2s infinite;
        }

        .animate-shake {
            animation: shake 0.5s ease-in-out;
        }

        /* Efecto Glassmorphism ajustado para tema claro */
        .glass {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03);
        }

        /* Botón primario en verde pastel */
        .btn-primary {
            background: linear-gradient(135deg, #A7C4AA 0%, #8FB593 100%);
            color: white;
            transition: all 0.3s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(167, 196, 170, 0.4);
        }

        .card-hover {
            transition: all 0.3s;
        }

        .card-hover:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.06);
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 9999;
            animation: slideIn 0.3s ease-out;
        }
    </style>
    <style>
        body {
            box-sizing: border-box;
        }
    </style>
</head>

            inventoryMovements: [],
            activityLog: [],
            notifications: [],
            kitchenReports: []
        };

        // ==================== STATE MANAGEMENT ====================
        let state = {};
        let currentUser = null;
        let currentView = 'pos';
        let currentCart = [];
        let selectedTable = null;

        async function saveToStorage() {
            try {
                await db.collection('pizzaManager').doc('state').set(state);
            } catch (error) {
                console.error("Error al guardar en Firebase:", error);
                showToast('Error al guardar datos', 'error');
            }
        }

        function loadFromStorage() {
            return new Promise((resolve) => {
                db.collection('pizzaManager').doc('state').onSnapshot((doc) => {
                    if (doc.exists) {
                        state = { ...DEFAULT_DATA, ...doc.data() };

                        if (currentUser) {
                            if (currentView === 'kitchen' || currentView === 'orders' || currentView === 'waiter') {
                                renderView(currentView);
                            }
                            updateNotificationBadge();
                        }
                    } else {
                        state = JSON.parse(JSON.stringify(DEFAULT_DATA));
                        saveToStorage();
                    }
                    resolve();
                }, (error) => {
                    console.error("Error de Firebase:", error);
                    if (Object.keys(state).length === 0) {
                        state = JSON.parse(JSON.stringify(DEFAULT_DATA));
                    }
                    resolve();
                });
            });
        }

        function logActivity(action, details) {
            state.activityLog.push({
                id: Date.now(),
                userId: currentUser?.id,
                userName: currentUser?.name,
                action,
                details,
                timestamp: new Date().toISOString()
            });
            saveToStorage();
        }

        function addNotification(type, message, forRoles = []) {
            const notif = {
                id: Date.now(),
                type,
                message,
                forRoles,
                timestamp: new Date().toISOString(),
                read: false
            };
            state.notifications.unshift(notif);
            if (state.notifications.length > 50) state.notifications.pop();
            saveToStorage();
            updateNotificationBadge();
        }

        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            const colors = {
                success: 'bg-green-500',
                error: 'bg-red-500',
                warning: 'bg-yellow-500',
                info: 'bg-blue-500'
            };
            toast.className = `toast ${colors[type]} text-white px-6 py-3 rounded-xl shadow-lg flex items-center gap-2 font-medium`;
            const icons = { success: '✅', error: '❌', warning: '⚠️', info: 'ℹ️' };
            toast.innerHTML = `<span>${icons[type]}</span><span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }

        // ==================== AUTHENTICATION ====================
        function handleLogin() {
            const username = document.getElementById('loginUser').value.toLowerCase();
            const password = document.getElementById('loginPass').value;
            const errorDiv = document.getElementById('loginError');

            const user = state.users.find(u => u.username === username && u.password === password && u.active);

            if (user) {
                currentUser = user;
                localStorage.setItem('currentUser', JSON.stringify(user));
                logActivity('LOGIN', `Usuario ${user.name} inició sesión`);
                errorDiv.classList.add('hidden');
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
                initMainApp();
            } else {
                errorDiv.textContent = 'Usuario o contraseña incorrectos';
                errorDiv.classList.remove('hidden');
                document.getElementById('loginUser').parentElement.classList.add('animate-shake');
                setTimeout(() => document.getElementById('loginUser').parentElement.classList.remove('animate-shake'), 500);
            }
        }

        function handleLogout() {
            logActivity('LOGOUT', `Usuario ${currentUser.name} cerró sesión`);
            currentUser = null;
            localStorage.removeItem('currentUser');
            document.getElementById('mainApp').classList.add('hidden');
            document.getElementById('loginScreen').classList.remove('hidden');
            document.getElementById('loginUser').value = '';
            document.getElementById('loginPass').value = '';
        }

        function checkSession() {
            const savedUser = localStorage.getItem('currentUser');
            if (savedUser) {
                currentUser = JSON.parse(savedUser);
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
                initMainApp();
            } else {
                document.getElementById('loginScreen').classList.remove('hidden');
            }
        }

        // ==================== MAIN APP INITIALIZATION ====================
        function initMainApp() {
            document.getElementById('userName').textContent = currentUser.name;
            const roleNames = { admin: 'Administrador', cashier: 'Cajero', kitchen: 'Cocina', waiter: 'Mesero' };
            const roleIcons = { admin: '👨‍💼', cashier: '💰', kitchen: '👨‍🍳', waiter: '🍽️' };
            document.getElementById('userRole').textContent = roleNames[currentUser.role];
            document.getElementById('userIcon').textContent = roleIcons[currentUser.role];

            renderNavigation();
            updateDateTime();
            setInterval(updateDateTime, 1000);
            updateNotificationBadge();

            const defaultViews = { admin: 'dashboard', cashier: 'pos', kitchen: 'kitchen', waiter: 'waiter' };
            currentView = defaultViews[currentUser.role];
            renderView(currentView);
        }

        function updateDateTime() {
            const now = new Date();
            document.getElementById('currentDateTime').textContent = now.toLocaleString('es-MX', {
                weekday: 'long', day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit'
            });
        }

        function updateNotificationBadge() {
            const relevant = state.notifications.filter(n =>
                !n.read && (n.forRoles.length === 0 || n.forRoles.includes(currentUser.role))
            );
            const badge = document.getElementById('notifCount');
            if (relevant.length > 0) {
                badge.textContent = relevant.length;
                badge.classList.remove('hidden');
            } else {
                badge.classList.add('hidden');
            }
        }

        function toggleNotifications() {
            const panel = document.getElementById('notifPanel');
            panel.classList.toggle('hidden');
            if (!panel.classList.contains('hidden')) {
                renderNotifications();
            }
        }

        function renderNotifications() {
            const list = document.getElementById('notifList');
            const relevant = state.notifications.filter(n =>
                n.forRoles.length === 0 || n.forRoles.includes(currentUser.role)
            ).slice(0, 20);

            if (relevant.length === 0) {
                list.innerHTML = '<p class="text-theme-textMuted text-sm text-center py-4">Sin notificaciones</p>';
                return;
            }

            list.innerHTML = relevant.map(n => `
                <div class="p-3 rounded-lg ${n.read ? 'bg-white/40' : 'bg-white/80 border border-white'} text-sm cursor-pointer hover:bg-white transition" onclick="markNotifRead(${n.id})">
                    <p class="${n.read ? 'text-theme-textMuted' : 'text-theme-text font-medium'}">${n.message}</p>
                    <p class="text-xs text-theme-textMuted mt-1">${new Date(n.timestamp).toLocaleString('es-MX')}</p>
                </div>
            `).join('');
        }

        function markNotifRead(id) {
            const notif = state.notifications.find(n => n.id === id);
            if (notif) {
                notif.read = true;
                saveToStorage();
                updateNotificationBadge();
                renderNotifications();
            }
        }

        // Colores pastel para los estados
        function getStatusClass(status) {

                delivered: 'bg-purple-200 text-purple-800',

        // ==================== POS (Point of Sale) ====================

        function renderPOSProducts(category) {
            const filtered = category === 'all'
                ? state.products.filter(p => p.active)
                : state.products.filter(p => p.active && p.category === category);

            return filtered.map(p => {
                const categoryIcons = { pizza: '🍕', drink: '🥤', extra: '🍟', promo: '🎉' };
                const displayIcon = p.icon || categoryIcons[p.category] || '🍽️';

                return `
                    <div onclick="addToCart(${p.id})" 
                        class="bg-white/80 rounded-xl p-4 cursor-pointer card-hover hover:border-theme-green border-2 border-transparent shadow-sm flex flex-col items-center text-center">
                        <div class="text-4xl mb-2 drop-shadow-sm">${displayIcon}</div>
                        <h4 class="font-bold text-sm mb-1 line-clamp-2 text-theme-text">${p.name}</h4>
                        <p class="text-theme-greenDark font-extrabold text-lg">$${p.price}</p>
                    </div>
                `;
            }).join('') || '<p class="col-span-full text-center text-theme-textMuted py-8">No hay productos en esta categoría</p>';
        }

        function filterPOSProducts(category) {
            document.querySelectorAll('[id^="cat-"]').forEach(btn => {
                btn.classList.remove('bg-theme-green', 'text-white', 'shadow-md');
                btn.classList.add('bg-white/60', 'text-theme-textMuted');
            });
            const activeBtn = document.getElementById(`cat-${category}`);
            activeBtn.classList.remove('bg-white/60', 'text-theme-textMuted');
            activeBtn.classList.add('bg-theme-green', 'text-white', 'shadow-md');
            document.getElementById('posProducts').innerHTML = renderPOSProducts(category);
        }

        function addToCart(productId) {
            const product = state.products.find(p => p.id === productId);
            if (!product) return;

            const existing = currentCart.find(item => item.productId === productId);
            if (existing) {
                existing.quantity++;
            } else {
                currentCart.push({ productId, name: product.name, price: product.price, quantity: 1 });
            }
            updateCartDisplay();
        }

        function removeFromCart(productId) {
            currentCart = currentCart.filter(item => item.productId !== productId);
            updateCartDisplay();
        }

        function updateCartItemQty(productId, delta) {
            const item = currentCart.find(i => i.productId === productId);
            if (item) {
                item.quantity += delta;
                if (item.quantity <= 0) {
                    removeFromCart(productId);
                } else {
                    updateCartDisplay();
                }
            }
        }

        function clearCart() {
            currentCart = [];
            updateCartDisplay();
        }

        function renderCartItems() {
            if (currentCart.length === 0) {
                return '<p class="text-theme-textMuted text-center py-8">El carrito está vacío</p>';
            }
            return currentCart.map(item => `
                <div class="flex items-center justify-between p-3 rounded-xl bg-white shadow-sm border border-theme-beige">
                    <div class="flex-1 pr-2">
                        <p class="font-bold text-sm text-theme-text line-clamp-1">${item.name}</p>
                        <p class="text-theme-greenDark font-bold text-sm">$${item.price} c/u</p>
                    </div>
                    <div class="flex items-center gap-2 bg-theme-bg p-1 rounded-lg border border-theme-beige">
                        <button onclick="updateCartItemQty(${item.productId}, -1)" class="w-7 h-7 rounded-md bg-white hover:bg-theme-beige transition text-theme-text font-bold">-</button>
                        <span class="w-6 text-center font-bold">${item.quantity}</span>
                        <button onclick="updateCartItemQty(${item.productId}, 1)" class="w-7 h-7 rounded-md bg-white hover:bg-theme-beige transition text-theme-text font-bold">+</button>
                    </div>
                </div>
            `).join('');
        }

        function calculateCartTotal() {
            return currentCart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
        }

        function updateCartDisplay() {
    const cartItemsEl = document.getElementById('cartItems');
    const subtotalEl = document.getElementById('cartSubtotal');
    const totalEl = document.getElementById('cartTotal');
    
    // 1. Buscamos los botones de pago por su nuevo ID
    const btnCash = document.getElementById('btnPayCash');
    const btnTransfer = document.getElementById('btnPayTransfer');

    if (cartItemsEl) cartItemsEl.innerHTML = renderCartItems();
    const total = calculateCartTotal();
    if (subtotalEl) subtotalEl.textContent = `$${total.toLocaleString()}`;
    if (totalEl) totalEl.textContent = `$${total.toLocaleString()}`;

    // 2. Comprobamos si hay productos y actualizamos los botones
    const hasItems = currentCart.length > 0;
    if (btnCash) btnCash.disabled = !hasItems;
    if (btnTransfer) btnTransfer.disabled = !hasItems;
}

        function processPayment(method) {
            if (currentCart.length === 0) {
                showToast('El carrito está vacío', 'warning');
                return;
            }

            if (!state.cashRegister.isOpen && currentUser.role !== 'admin') {
                showToast('La caja no está abierta', 'error');
                return;
            }

            const total = calculateCartTotal();

            if (method === 'cash') {
                showCashPaymentModal(total);
            } else {
                completeSale(method, total, 0);
            }
        }

        function showCashPaymentModal(total) {
            const modal = document.getElementById('modalContainer');
            modal.innerHTML = `
                <div class="glass bg-white/90 rounded-3xl p-6 w-full max-w-md animate-slideIn border-2 border-white shadow-2xl">
                    <h3 class="text-xl font-bold mb-4 flex items-center gap-2 text-theme-greenDark">💵 Pago en Efectivo</h3>
                    <div class="space-y-4">
                        <div class="text-center p-4 rounded-xl bg-theme-bg border border-theme-beige">
                            <p class="text-sm text-theme-textMuted font-medium">Total a pagar</p>
                            <p class="text-4xl font-extrabold text-theme-greenDark mt-1">$${total.toLocaleString()}</p>
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-2 text-theme-text">Cantidad recibida</label>
                            <input type="number" id="cashReceived" class="w-full px-4 py-3 bg-white border-2 border-theme-beige rounded-xl text-2xl text-center focus:outline-none focus:border-theme-green font-bold text-theme-text" 
                                placeholder="0" oninput="calculateChange(${total})">
                        </div>
                        <div id="changeDisplay" class="text-center p-4 rounded-xl bg-green-50 border border-green-200 hidden">
                            <p class="text-sm text-green-700 font-medium">Su Cambio</p>
                            <p class="text-3xl font-extrabold text-green-600 mt-1">$<span id="changeAmount">0</span></p>
                        </div>
                        <div class="grid grid-cols-2 gap-3 pt-2">
                            <button onclick="closeModal()" class="py-3 rounded-xl bg-white hover:bg-theme-beige border border-theme-beige transition font-medium">Cancelar</button>
                            <button onclick="completeCashPayment(${total})" id="confirmPaymentBtn" class="btn-primary py-3 rounded-xl font-bold shadow-md" disabled>Confirmar Pago</button>
                        </div>
                    </div>
                </div>
            `;
            modal.classList.remove('hidden');
            // Auto focus for faster typing
            setTimeout(() => document.getElementById('cashReceived').focus(), 100);
        }

        function calculateChange(total) {
            const received = parseFloat(document.getElementById('cashReceived').value) || 0;
            const change = received - total;
            const changeDisplay = document.getElementById('changeDisplay');
            const changeAmount = document.getElementById('changeAmount');
            const confirmBtn = document.getElementById('confirmPaymentBtn');

            if (received >= total) {
                changeDisplay.classList.remove('hidden');
                changeAmount.textContent = change.toLocaleString();
                confirmBtn.disabled = false;
            } else {
                changeDisplay.classList.add('hidden');
                confirmBtn.disabled = true;
            }
        }

        
        function completeCashPayment(total) {
            const received = parseFloat(document.getElementById('cashReceived').value) || 0;
            const change = received - total;
            completeSale('cash', total, change);
            // Ya no llamamos a closeModal() aquí porque completeSale llamará a showReceipt()
        }

        function completeSale(paymentMethod, total, change) {
            const orderId = Date.now();
            const order = {
                id: orderId,
                type: 'counter',
                items: [...currentCart],
                total,
                status: 'pending',
                paymentMethod,
                paymentStatus: 'paid',
                createdAt: new Date().toISOString(),
                createdBy: currentUser.id,
                tableId: null
            };

            state.orders.push(order);

            const sale = {
                id: Date.now(),
                orderId,
                items: [...currentCart],
                subtotal: total,
                total,
                paymentMethod,
                cashReceived: paymentMethod === 'cash' ? total + change : null,
                change: paymentMethod === 'cash' ? change : null,
                timestamp: new Date().toISOString(),
                cashierId: currentUser.id,
                cashierName: currentUser.name
            };

            state.sales.push(sale);

            // Deduct inventory
            currentCart.forEach(cartItem => {
                const product = state.products.find(p => p.id === cartItem.productId);
                if (product && product.ingredients) {
                    product.ingredients.forEach(ing => {
                        const invItem = state.inventory.find(i => i.id === ing.id);
                        if (invItem) {
                            invItem.stock -= ing.qty * cartItem.quantity;
                            if (invItem.stock <= invItem.minStock) {
                                addNotification('warning', `⚠️ Stock bajo: ${invItem.name}`, ['admin', 'cashier']);
                            }
                        }
                    });
                }
            });

            if (state.cashRegister.isOpen) {
                state.cashRegister.movements.push({
                    type: 'sale',
                    amount: total,
                    paymentMethod,
                    orderId,
                    timestamp: new Date().toISOString()
                });
            }

            logActivity('SALE', `Venta #${orderId.toString().slice(-4)} por $${total} - ${paymentMethod}`);
            addNotification('info', `🍕 Nuevo pedido #${orderId.toString().slice(-4)}`, ['kitchen']);

            saveToStorage();
            showToast(`Venta completada - Ticket #${orderId.toString().slice(-4)}`, 'success');
            showReceipt(sale);

            currentCart = [];
            updateCartDisplay();
        }

        function showReceipt(sale) {

            modal.innerHTML = `
                <div class="bg-white text-theme-text rounded-3xl p-8 w-full max-w-sm animate-slideIn shadow-2xl" id="printArea">
                    <div class="text-center border-b-2 border-dashed border-theme-beige pb-6 mb-6">
                        <p class="text-5xl mb-3">🍕</p>
                        <h3 class="text-2xl font-extrabold text-theme-greenDark">PIZZERÍA</h3>
                        <p class="text-sm text-theme-textMuted font-medium">Ticket de Venta</p>
                        <p class="text-xs text-theme-textMuted mt-1">${new Date(sale.timestamp).toLocaleString('es-MX')}</p>
                    </div>
                    <div class="space-y-3 mb-6 text-sm font-medium">
                        ${sale.items.map(item => `
                            <div class="flex justify-between">
                                <span>${item.quantity}x ${item.name}</span>
                                <span class="font-bold">$${(item.price * item.quantity).toLocaleString()}</span>
                            </div>
                        `).join('')}
                    </div>
                    <div class="border-t-2 border-dashed border-theme-beige pt-6 space-y-3">
                        <div class="flex justify-between font-extrabold text-xl text-theme-greenDark">
                            <span>TOTAL:</span>
                            <span>$${sale.total.toLocaleString()}</span>
                        </div>
                        ${sale.paymentMethod === 'cash' ? `
                            <div class="flex justify-between text-sm text-theme-textMuted">
                                <span>Efectivo:</span>
                                <span>$${sale.cashReceived?.toLocaleString()}</span>
                            </div>
                            <div class="flex justify-between text-sm text-theme-textMuted">
                                <span>Cambio:</span>
                                <span>$${sale.change?.toLocaleString()}</span>
                            </div>
                        ` : `
                            <div class="flex justify-between text-sm text-theme-textMuted">
                                <span>Método:</span>
                                <span class="font-bold">Transferencia</span>
                            </div>
                        `}
                    </div>
                    <div class="text-center mt-8 pt-6 border-t border-theme-beige">
                        <p class="text-sm font-bold text-theme-greenDark">¡Gracias por su compra!</p>
                        <p class="text-xs text-theme-textMuted mt-1">Ticket #${sale.orderId.toString().slice(-4)}</p>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-3 mt-6 print:hidden">
                        <button onclick="closeModal()" class="py-3 bg-theme-bg text-theme-text font-bold rounded-xl border border-theme-beige hover:bg-theme-beige transition">
                            Cerrar
                        </button>
                        <button onclick="window.print()" class="btn-primary py-3 font-bold rounded-xl shadow-md flex items-center justify-center gap-2">

                        </button>

        function closeModal() {
            document.getElementById('modalContainer').classList.add('hidden');
        }

        // ==================== KITCHEN MODULE ====================
        // ==================== KITCHEN MODULE ====================
        let currentKitchenTab = 'active';

        function renderKitchen(container, tab = currentKitchenTab) {
            currentKitchenTab = tab;

            const pendingOrders = state.orders.filter(o => o.status !== 'delivered' && o.status !== 'cancelled')
                .sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt));

            const sevenDaysAgo = new Date();
            sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 7);
            sevenDaysAgo.setHours(0, 0, 0, 0);

            const historyOrders = state.orders.filter(o => {
                const isHistoryStatus = ['delivered', 'ready', 'cancelled'].includes(o.status);
                const isRecent = new Date(o.createdAt) >= sevenDaysAgo;
                return isHistoryStatus && isRecent;
            }).sort((a, b) => new Date(b.statusUpdatedAt || b.createdAt) - new Date(a.statusUpdatedAt || a.createdAt));

            const groupedHistory = {};
            historyOrders.forEach(o => {
                const dateObj = new Date(o.statusUpdatedAt || o.createdAt);
                const dateLabel = dateObj.toLocaleDateString('es-MX', { weekday: 'long', day: '2-digit', month: 'short', year: 'numeric' });
                const sortKey = dateObj.toLocaleDateString('en-CA');

                if (!groupedHistory[sortKey]) {
                    groupedHistory[sortKey] = {
                        label: dateLabel,
                        orders: []
                    };
                }
                groupedHistory[sortKey].orders.push(o);
            });

            const sortedDateKeys = Object.keys(groupedHistory).sort((a, b) => new Date(b) - new Date(a));

            container.innerHTML = `
                <div class="animate-slideIn h-full flex flex-col">
                    <div class="flex flex-col md:flex-row items-start md:items-center justify-between mb-6 gap-4 shrink-0">
                        <div class="flex flex-col md:flex-row items-start md:items-center gap-4">
                            <h2 class="text-2xl font-bold flex items-center gap-3 text-theme-greenDark">👨‍🍳 Cocina</h2>
                            
                            <div class="flex bg-white/60 p-1 rounded-xl border border-white">
                                <button onclick="renderKitchen(document.getElementById('contentArea'), 'active')" 
                                    class="${tab === 'active' ? 'bg-theme-green text-white shadow-md' : 'text-theme-textMuted hover:bg-white/50'} px-4 py-2 rounded-lg text-sm transition font-bold">
                                    🔥 Activos (${pendingOrders.length})
                                </button>
                                <button onclick="renderKitchen(document.getElementById('contentArea'), 'history')" 
                                    class="${tab === 'history' ? 'bg-theme-green text-white shadow-md' : 'text-theme-textMuted hover:bg-white/50'} px-4 py-2 rounded-lg text-sm transition font-bold">
                                    📅 Historial Semanal
                                </button>
                            </div>
                        </div>
                        
                        <button onclick="showKitchenReportModal()" class="btn-primary px-5 py-2.5 rounded-xl flex items-center gap-2 text-sm font-bold shadow-md">
                            📝 Reporte del Día
                        </button>
                    </div>

                    <div class="overflow-auto pb-4 scrollbar-thin flex-1 pr-2">
                        ${tab === 'active' ? renderActiveOrders(pendingOrders) : renderWeeklyHistory(groupedHistory, sortedDateKeys)}
                    </div>
                </div>
            `;
        }

        function renderActiveOrders(orders) {
            if (orders.length === 0) return '<div class="h-full flex items-center justify-center"><p class="text-theme-textMuted py-12 text-xl font-medium">🎉 ¡La cocina está al día!</p></div>';

            return `
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
                    ${orders.map(order => renderOrderCard(order, false)).join('')}
                </div>
            `;
        }

        function renderWeeklyHistory(groupedHistory, sortedKeys) {
            if (sortedKeys.length === 0) return '<div class="h-full flex items-center justify-center"><p class="text-theme-textMuted py-12 text-xl font-medium">No hay pedidos registrados en los últimos 7 días.</p></div>';

            return `
                <div class="space-y-8">
                    ${sortedKeys.map(dateKey => `
                        <div class="bg-white/60 rounded-2xl p-5 border border-white animate-slideIn shadow-sm">
                            <h3 class="text-lg font-bold text-theme-greenDark mb-4 border-b border-theme-beige pb-3 capitalize flex items-center gap-3">
                                📅 ${groupedHistory[dateKey].label}
                                <span class="text-xs text-white bg-theme-green px-3 py-1 rounded-full font-bold shadow-sm">
                                    ${groupedHistory[dateKey].orders.length} pedidos
                                </span>
                            </h3>
                            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
                                ${groupedHistory[dateKey].orders.map(order => renderOrderCard(order, true)).join('')}
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function renderOrderCard(order, isHistory) {
            const endTime = order.statusUpdatedAt ? new Date(order.statusUpdatedAt) : new Date();
            const waitTime = Math.floor((endTime - new Date(order.createdAt)) / 60000);

            return `
                <div class="bg-white rounded-2xl p-4 flex flex-col border border-white shadow-sm ${isHistory ? 'opacity-80 border-l-4 border-l-green-400 bg-theme-bg' : 'card-hover'} ${!isHistory && waitTime > 15 ? 'border-2 border-red-400 shadow-[0_0_15px_rgba(239,68,68,0.2)]' : ''} ${!isHistory && waitTime > 10 && waitTime <= 15 ? 'border-2 border-yellow-400' : ''}">
                    <div class="flex items-center justify-between mb-3">
                        <div>
                            <span class="text-xl font-extrabold text-theme-text">#${order.id.toString().slice(-4)}</span>
                            <span class="ml-2 px-2 py-1 rounded-full text-xs font-bold text-white shadow-sm ${order.type === 'table' ? 'bg-purple-400' : 'bg-blue-400'}">
                                ${order.type === 'table' ? `Mesa ${order.tableId}` : 'Mostrador'}
                            </span>
                        </div>
                        <span class="text-xs ${!isHistory && waitTime > 15 ? 'text-red-600 animate-pulse-custom font-extrabold' : !isHistory && waitTime > 10 ? 'text-yellow-600 font-bold' : 'text-theme-textMuted font-medium'}">
                            ⏱️ ${waitTime} min
                        </span>
                    </div>
                    <div class="space-y-2 mb-4 flex-1">
                        ${order.items.map(item => `
                            <div class="flex justify-between text-sm p-2 rounded-lg bg-theme-bg border border-theme-beige text-theme-text font-medium">
                                <span><strong class="text-theme-greenDark mr-1">${item.quantity}x</strong> ${item.name}</span>
                            </div>
                        `).join('')}
                    </div>
                    <div class="flex items-center justify-between mt-auto border-t border-theme-beige pt-3">
                        <span class="px-3 py-1 rounded-full text-xs font-bold ${getStatusClass(order.status)}">
                            ${getStatusLabel(order.status)}
                        </span>
                        
                        ${!isHistory ? `
                            <div class="flex gap-2">
                                ${order.status === 'pending' ? `
                                    <button onclick="updateOrderStatus(${order.id}, 'preparing')" class="px-3 py-1.5 rounded-lg bg-blue-500 text-white hover:bg-blue-600 text-sm font-bold transition shadow-sm">
                                        🍳 Preparar
                                    </button>
                                ` : order.status === 'preparing' ? `
                                    <button onclick="updateOrderStatus(${order.id}, 'ready')" class="px-3 py-1.5 rounded-lg bg-green-500 text-white hover:bg-green-600 text-sm font-bold transition shadow-sm">
                                        ✅ Listo
                                    </button>
                                ` : order.status === 'ready' ? `
                                    <button onclick="updateOrderStatus(${order.id}, 'delivered')" class="px-3 py-1.5 rounded-lg bg-purple-500 text-white hover:bg-purple-600 text-sm font-bold transition shadow-sm">
                                        🚀 Entregar
                                    </button>
                                ` : ''}
                            </div>
                        ` : `
                            <span class="text-xs text-theme-textMuted bg-white border border-theme-beige px-2 py-1 rounded-lg font-medium">
                                ✅ ${new Date(order.statusUpdatedAt || order.createdAt).toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit' })}
                            </span>
                        `}
                    </div>
                </div>
            `;
        }

        function updateOrderStatus(orderId, newStatus) {
            const order = state.orders.find(o => o.id === orderId);
            if (order) {
                order.status = newStatus;
                order.statusUpdatedAt = new Date().toISOString();
                order.statusUpdatedBy = currentUser.id;

                if (newStatus === 'ready') {
                    addNotification('success', `✅ Pedido #${orderId.toString().slice(-4)} listo para entregar`, ['cashier', 'waiter']);
                }

                if (newStatus === 'delivered' && order.type === 'table') {
                    const table = state.tables.find(t => t.id === order.tableId);
                    if (table) table.status = 'free';
                }

                logActivity('ORDER_STATUS', `Pedido #${orderId.toString().slice(-4)} cambió a ${newStatus}`);
                saveToStorage();
                showToast(`Pedido actualizado a: ${getStatusLabel(newStatus)}`, 'success');
                // Al actualizar un estado, hay que redibujar la cocina
                renderKitchen(document.getElementById('contentArea'), currentKitchenTab);
            }
        }

        function showKitchenReportModal() {
            const today = new Date().toDateString();
            const todayOrders = state.orders.filter(o => new Date(o.createdAt).toDateString() === today && o.status !== 'cancelled');

            const productCounts = {};
            todayOrders.forEach(order => {
                order.items.forEach(item => {
                    if (!productCounts[item.name]) productCounts[item.name] = 0;
                    productCounts[item.name] += item.quantity;
                });
            });

            const productsSummary = Object.entries(productCounts).sort((a, b) => b[1] - a[1]);
            const totalItems = productsSummary.reduce((sum, [_, qty]) => sum + qty, 0);

            const modal = document.getElementById('modalContainer');
            modal.innerHTML = `
                <div class="glass bg-white/90 rounded-3xl p-6 w-full max-w-lg animate-slideIn flex flex-col max-h-[90vh] shadow-2xl border-2 border-white">
                    <div class="flex items-center justify-between mb-4 pb-2 border-b border-theme-beige">
                        <h3 class="text-xl font-bold flex items-center gap-2 text-theme-greenDark">📊 Reporte de Cocina</h3>
                        <button onclick="closeModal()" class="p-2 bg-white rounded-lg transition text-theme-textMuted hover:bg-theme-beige border border-theme-beige">✕</button>
                    </div>
                    
                    <div class="overflow-y-auto flex-1 scrollbar-thin pr-2 space-y-5 mb-4">
                        <div class="grid grid-cols-2 gap-4">
                            <div class="bg-blue-50 border border-blue-200 p-4 rounded-xl text-center shadow-sm">
                                <p class="text-blue-700 text-sm mb-1 font-medium">Pedidos Atendidos</p>
                                <p class="text-4xl font-extrabold text-blue-600">${todayOrders.length}</p>
                            </div>
                            <div class="bg-green-50 border border-green-200 p-4 rounded-xl text-center shadow-sm">
                                <p class="text-green-700 text-sm mb-1 font-medium">Items Preparados</p>
                                <p class="text-4xl font-extrabold text-green-600">${totalItems}</p>
                            </div>
                        </div>

                        <div>
                            <h4 class="font-bold text-theme-greenDark mb-3 flex items-center gap-2">
                                🍕 Desglose de Producción
                            </h4>
                            <div class="space-y-2 max-h-48 overflow-y-auto scrollbar-thin pr-2 bg-white border border-theme-beige p-3 rounded-xl shadow-inner">
                                ${productsSummary.length > 0 ? productsSummary.map(([name, qty]) => `
                                    <div class="flex justify-between items-center py-2 border-b border-theme-beige last:border-0">
                                        <span class="text-sm font-medium text-theme-text">${name}</span>
                                        <span class="font-bold bg-theme-bg border border-theme-beige px-3 py-1 rounded-lg text-sm text-theme-greenDark">${qty}</span>
                                    </div>
                                `).join('') : '<p class="text-theme-textMuted text-center py-4 text-sm font-medium">No se han preparado productos hoy.</p>'}
                            </div>
                        </div>

                        <div>
                            <label class="block text-sm font-bold text-theme-text mb-2">Notas para Administración (Opcional)</label>
                            <textarea id="kitchenNotes" rows="3" class="w-full px-4 py-3 bg-white border border-theme-beige rounded-xl focus:outline-none focus:border-theme-green transition resize-none text-sm text-theme-text shadow-sm" placeholder="Ej. Hubo escasez de queso, la masa tardó en leudar..."></textarea>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-3 pt-4 shrink-0 border-t border-theme-beige">
                        <button onclick="closeModal()" class="py-3.5 rounded-xl bg-white hover:bg-theme-beige border border-theme-beige transition font-bold text-theme-text">Cancelar</button>
                        <button onclick="sendKitchenReport()" class="btn-primary py-3.5 rounded-xl font-bold flex items-center justify-center gap-2 shadow-md" ${todayOrders.length === 0 ? 'disabled' : ''}>
                            📤 Enviar Cierre
                        </button>
                    </div>
                </div>
            `;
            modal.classList.remove('hidden');
        }

        function sendKitchenReport() {
            const notes = document.getElementById('kitchenNotes').value.trim();
            const today = new Date().toDateString();
            const todayOrders = state.orders.filter(o => new Date(o.createdAt).toDateString() === today && o.status !== 'cancelled');

            if (!state.kitchenReports) state.kitchenReports = [];

            const report = {
                id: Date.now(),
                date: new Date().toISOString(),
                createdBy: currentUser.id,
                createdByName: currentUser.name,
                totalOrders: todayOrders.length,
                notes: notes
            };

            state.kitchenReports.push(report);

            addNotification('info', `👨‍🍳 Reporte de cocina enviado por ${currentUser.name}. Pedidos: ${todayOrders.length}. ${notes ? '⚠️ Tiene notas.' : ''}`, ['admin']);
            logActivity('KITCHEN_REPORT', `Reporte de cierre de cocina enviado. ${todayOrders.length} pedidos. Notas: ${notes || 'Ninguna'}`);

            saveToStorage();
            showToast('Reporte enviado correctamente a administración', 'success');
            closeModal();
        }

        // ==================== WAITER MODULE ====================
        function renderWaiter(container) {
            container.innerHTML = `
                <div class="animate-slideIn">
                    <h2 class="text-2xl font-bold mb-6 flex items-center gap-3 text-theme-greenDark">🍽️ Mesas</h2>
                    
                    <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
                        ${state.tables.map(table => {
                const activeOrder = state.orders.find(o => o.tableId === table.id && o.status !== 'delivered' && o.status !== 'cancelled');
                return `
                                <div onclick="selectTable(${table.id})" 
                                    class="bg-white/80 rounded-2xl p-6 cursor-pointer card-hover text-center shadow-sm border-2
                                    ${table.status === 'occupied' ? 'border-orange-400' : 'border-transparent hover:border-theme-green'}">
                                    <div class="text-4xl mb-3">${table.status === 'occupied' ? '🍽️' : '🪑'}</div>
                                    <h3 class="text-xl font-bold text-theme-text">${table.name}</h3>
                                    <p class="text-sm text-theme-textMuted font-medium">${table.capacity} personas</p>
                                    <span class="inline-block mt-3 px-3 py-1 rounded-full text-xs font-bold text-white shadow-sm ${table.status === 'occupied' ? 'bg-orange-400' : 'bg-green-400'}">
                                        ${table.status === 'occupied' ? 'Ocupada' : 'Libre'}
                                    </span>
                                    ${activeOrder ? `
                                        <p class="mt-3 text-xs text-theme-textMuted font-medium">Pedido #${activeOrder.id.toString().slice(-4)}</p>
                                        <p class="text-xs font-bold ${getStatusClass(activeOrder.status)} px-2 py-1 rounded-full inline-block mt-1 shadow-sm">${getStatusLabel(activeOrder.status)}</p>
                                    ` : ''}
                                </div>
                            `;
            }).join('')}
                    </div>
                </div>
            `;
        }

        function selectTable(tableId) {
            selectedTable = tableId;
            const table = state.tables.find(t => t.id === tableId);
            const activeOrder = state.orders.find(o => o.tableId === tableId && o.status !== 'delivered' && o.status !== 'cancelled');

            const modal = document.getElementById('modalContainer');
            modal.innerHTML = `
                <div class="glass bg-white/90 rounded-3xl p-6 w-full max-w-4xl animate-slideIn max-h-[90%] overflow-auto shadow-2xl border-2 border-white">
                    <div class="flex items-center justify-between mb-6 border-b border-theme-beige pb-4">
                        <h3 class="text-xl font-bold flex items-center gap-2 text-theme-greenDark">🍽️ ${table.name}</h3>
                        <button onclick="closeModal()" class="p-2 bg-white rounded-lg transition text-theme-textMuted hover:bg-theme-beige border border-theme-beige font-bold">✕</button>
                    </div>

                    ${activeOrder ? `
                        <div class="mb-6 p-4 rounded-2xl bg-theme-bg border border-theme-beige shadow-inner">
                            <h4 class="font-bold mb-3 text-theme-text">Pedido Actual #${activeOrder.id.toString().slice(-4)}</h4>
                            <div class="space-y-2 mb-3">
                                ${activeOrder.items.map(item => `
                                    <div class="flex justify-between text-sm font-medium">
                                        <span><strong class="text-theme-greenDark">${item.quantity}x</strong> ${item.name}</span>
                                        <span class="font-bold">$${(item.price * item.quantity).toLocaleString()}</span>
                                    </div>
                                `).join('')}
                            </div>
                            <div class="flex justify-between font-extrabold border-t border-theme-beige pt-3 text-lg text-theme-greenDark">
                                <span>Total:</span>
                                <span>$${activeOrder.total.toLocaleString()}</span>
                            </div>
                            <div class="flex gap-2 mt-4">
                                <span class="px-3 py-1.5 rounded-full text-xs font-bold shadow-sm ${getStatusClass(activeOrder.status)}">${getStatusLabel(activeOrder.status)}</span>
                            </div>
                        </div>
                    ` : ''}

                    <div class="flex gap-4 flex-col lg:flex-row">
                        <div class="flex-1">
                            <h4 class="font-bold mb-3 text-theme-text">Agregar Productos</h4>
                            <div class="grid grid-cols-2 md:grid-cols-3 gap-2 max-h-60 overflow-auto scrollbar-thin pr-2">
                                ${state.products.filter(p => p.active).map(p => {
                const categoryIcons = { pizza: '🍕', drink: '🥤', extra: '🍟', promo: '🎉' };
                const displayIcon = p.icon || categoryIcons[p.category] || '🍽️';
                return `
                                        <div onclick="addToTableOrder(${p.id})" 
                                            class="p-3 rounded-xl bg-white border border-theme-beige shadow-sm hover:border-theme-green cursor-pointer transition text-center flex flex-col items-center justify-center gap-1">
                                            <span class="text-2xl drop-shadow-sm">${displayIcon}</span>
                                            <p class="text-sm font-bold text-theme-text line-clamp-1">${p.name}</p>
                                            <p class="text-theme-greenDark font-extrabold text-sm">$${p.price}</p>
                                        </div>
                                    `;
            }).join('')}
                            </div>
                        </div>

                        <div class="w-full lg:w-72 p-5 rounded-2xl bg-white border border-theme-beige shadow-sm">
                            <h4 class="font-bold mb-3 text-theme-text">Nueva Orden</h4>
                            <div id="tableCart" class="space-y-3 max-h-40 overflow-auto scrollbar-thin pr-2 mb-4">
                                ${currentCart.length === 0 ? '<p class="text-theme-textMuted text-sm text-center py-4 font-medium">Sin productos</p>' :
                    currentCart.map(item => `
                                        <div class="flex justify-between text-sm font-medium border-b border-theme-bg pb-2 last:border-0">
                                            <span><strong class="text-theme-greenDark">${item.quantity}x</strong> ${item.name}</span>
                                            <span class="font-bold">$${(item.price * item.quantity).toLocaleString()}</span>
                                        </div>
                                    `).join('')
                }
                            </div>
                            <div class="border-t border-theme-beige pt-3 mb-4">
                                <div class="flex justify-between font-extrabold text-lg text-theme-greenDark">
                                    <span>Total:</span>
                                    <span id="tableCartTotal">$${calculateCartTotal().toLocaleString()}</span>
                                </div>
                            </div>
                            <div class="space-y-2">
                                <button onclick="sendTableOrder(${tableId})" class="w-full btn-primary py-3 rounded-xl text-sm font-bold shadow-md" ${currentCart.length === 0 ? 'disabled' : ''}>
                                    📤 Enviar a Cocina
                                </button>
                                <button onclick="clearCart(); selectTable(${tableId})" class="w-full py-3 rounded-xl bg-theme-bg hover:bg-theme-beige border border-theme-beige text-sm transition font-bold text-theme-text">
                                    🗑️ Limpiar
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            modal.classList.remove('hidden');
        }

        function addToTableOrder(productId) {
            addToCart(productId);
            selectTable(selectedTable);
        }

        function sendTableOrder(tableId) {
            if (currentCart.length === 0) return;

            const table = state.tables.find(t => t.id === tableId);
            const orderId = Date.now();
            const total = calculateCartTotal();

            const order = {
                id: orderId,
                type: 'table',
                tableId,
                items: [...currentCart],
                total,
                status: 'pending',
                paymentStatus: 'pending',
                createdAt: new Date().toISOString(),
                createdBy: currentUser.id,
                waiterName: currentUser.name
            };

            state.orders.push(order);
            table.status = 'occupied';

            logActivity('ORDER_CREATE', `Pedido #${orderId.toString().slice(-4)} creado para ${table.name}`);
            addNotification('info', `🍕 Nuevo pedido #${orderId.toString().slice(-4)} de ${table.name}`, ['kitchen']);

            saveToStorage();
            showToast('Pedido enviado a cocina', 'success');

            currentCart = [];
            closeModal();
            renderWaiter(document.getElementById('contentArea'));
        }

        function renderMyOrders(container) {
            const myOrders = state.orders.filter(o => o.createdBy === currentUser.id)
                .sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

            container.innerHTML = `
                <div class="animate-slideIn">
                    <h2 class="text-2xl font-bold mb-6 flex items-center gap-3 text-theme-greenDark">📋 Mis Pedidos</h2>
                    
                    <div class="space-y-4">
                        ${myOrders.slice(0, 20).map(order => `
                            <div class="bg-white/80 rounded-xl p-5 flex flex-col md:flex-row md:items-center justify-between shadow-sm border border-white">
                                <div class="mb-3 md:mb-0">
                                    <p class="font-extrabold text-theme-text text-lg">#${order.id.toString().slice(-4)} - <span class="text-theme-greenDark">${order.type === 'table' ? `Mesa ${order.tableId}` : 'Mostrador'}</span></p>
                                    <p class="text-sm text-theme-textMuted font-medium mt-1">${order.items.map(i => `<strong>${i.quantity}x</strong> ${i.name}`).join(', ')}</p>
                                    <p class="text-xs text-theme-textMuted mt-1">🕒 ${new Date(order.createdAt).toLocaleString('es-MX')}</p>
                                </div>
                                <div class="text-left md:text-right flex flex-col justify-between items-start md:items-end h-full">
                                    <p class="font-extrabold text-xl text-theme-greenDark mb-2">$${order.total.toLocaleString()}</p>
                                    <span class="px-3 py-1 rounded-full text-xs font-bold shadow-sm ${getStatusClass(order.status)}">${getStatusLabel(order.status)}</span>
                                </div>
                            </div>
                        `).join('') || '<p class="text-theme-textMuted text-center py-8 font-medium">No has creado pedidos aún</p>'}
                    </div>
                </div>
            `;
        }

        // ==================== TICKET HISTORY MODULE ====================
        function renderTicketHistory(container) {
            const sales = state.sales.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

        function addInventoryEntry(itemId) {
            const qty = parseFloat(document.getElementById('entryQty').value);
            const notes = document.getElementById('entryNotes').value;

            if (!qty || qty <= 0) {
                showToast('Ingresa una cantidad válida', 'warning');
                return;
            }

            const item = state.inventory.find(i => i.id === itemId);
            item.stock += qty;

            state.inventoryMovements.push({
                id: Date.now(),
                itemId,
                itemName: item.name,
                type: 'entry',
                quantity: qty,
                notes,
                timestamp: new Date().toISOString(),
                userId: currentUser.id,
                userName: currentUser.name
            });

            logActivity('INVENTORY_ENTRY', `Entrada de ${qty} ${item.unit} de ${item.name}`);
            saveToStorage();
            showToast(`Entrada registrada: ${qty} ${item.unit} de ${item.name}`, 'success');
            closeModal();
            renderInventory(document.getElementById('contentArea'));
        }

        function saveNewInventoryItem() {
            const name = document.getElementById('newItemName').value.trim();
            const unit = document.getElementById('newItemUnit').value;
            const stock = parseFloat(document.getElementById('newItemStock').value) || 0;
            const minStock = parseFloat(document.getElementById('newItemMin').value) || 0;
            const cost = parseFloat(document.getElementById('newItemCost').value) || 0;
            const supplier = document.getElementById('newItemSupplier').value.trim();

            if (!name) {
                showToast('Ingresa un nombre para el insumo', 'warning');
                return;
            }

            const newItem = {
                id: Date.now(),
                name,
                unit,
                stock,
                minStock,
                cost,
                supplier: supplier || 'Sin proveedor'
            };

            state.inventory.push(newItem);
            logActivity('INVENTORY_ADD', `Nuevo insumo agregado: ${name}`);
            saveToStorage();
            showToast('Insumo agregado correctamente', 'success');

                return;

            const newUser = {
                id: Date.now(),
                name,
                username,
                password,
                role,
                active: true

            state.users.push(newUser);
            logActivity('USER_ADD', `Nuevo usuario: ${name} (${role})`);

            closeModal();

        function updateUser(userId) {
            const user = state.users.find(u => u.id === userId);
            const newName = document.getElementById('editUserName').value.trim();
            const newUsername = document.getElementById('editUserUsername').value.trim().toLowerCase();
            const newPassword = document.getElementById('editUserPassword').value;

            if (!newName || !newUsername) {
                showToast('El nombre y el usuario no pueden estar vacíos', 'warning');
                return;
            }

            if (state.users.some(u => u.username === newUsername && u.id !== userId)) {
                showToast('El nombre de usuario ya está en uso', 'error');
                return;
            }

            user.name = newName;
            user.username = newUsername;

            if (newPassword) {
                user.password = newPassword;
            }

            if (user.id !== currentUser.id) {
                user.role = document.getElementById('editUserRole').value;
            }

            if (user.id === currentUser.id) {
                currentUser = { ...user };
                localStorage.setItem('currentUser', JSON.stringify(currentUser));
                document.getElementById('userName').textContent = currentUser.name;
            }

            logActivity('USER_UPDATE', `Usuario actualizado: ${user.name}`);
            saveToStorage();
            showToast('Usuario actualizado', 'success');
            closeModal();
            renderUsers(document.getElementById('contentArea'));
        }

            const cashSales = cr.movements.filter(m => m.type === 'sale' && m.paymentMethod === 'cash')

            const expectedCash = cr.initialAmount + cashSales;

            modal.innerHTML = `

                        <div>

                            <input type="number" id="countedCash" class="w-full px-4 py-3 bg-white border-2 border-theme-beige rounded-xl text-2xl text-center focus:outline-none focus:border-theme-green font-bold text-theme-text"

                </div>
            `;
            modal.classList.remove('hidden');

        function calculateDifference(expected) {
            const counted = parseFloat(document.getElementById('countedCash').value) || 0;
            const diff = counted - expected;
            const display = document.getElementById('differenceDisplay');
            const amount = document.getElementById('differenceAmount');

            display.classList.remove('hidden');
            amount.textContent = `${diff >= 0 ? '+' : ''}$${diff.toLocaleString()}`;
            amount.className = `text-2xl font-extrabold mt-1 ${diff === 0 ? 'text-green-600' : 'text-red-600'}`;
        }

        function closeCashRegister(expected) {
            const counted = parseFloat(document.getElementById('countedCash').value) || 0;
            const difference = counted - expected;

            state.cashRegister.movements.push({
                type: 'close',
                amount: counted,
                expected,
                difference,
                timestamp: new Date().toISOString()
            });

            logActivity('CASH_CLOSE', `Caja cerrada. Esperado: $${expected}, Contado: $${counted}, Diferencia: $${difference}`);

            state.cashRegister.isOpen = false;

            saveToStorage();
            showToast(`Caja cerrada. Diferencia: $${difference}`, difference === 0 ? 'success' : 'warning');
            closeModal();
            renderCashRegister(document.getElementById('contentArea'));
        }

        // ==================== EXISTING ORDER PAYMENT LOGIC ====================
        function payExistingOrder(orderId, method) {
            if (!state.cashRegister.isOpen && currentUser.role !== 'admin') {
                showToast('La caja no está abierta', 'error');
                return;
            }

            const order = state.orders.find(o => o.id === orderId);
            if (!order) return;

            if (method === 'cash') {
                showOrderCashModal(order);
            } else {
                processOrderPayment(order, 'transfer', order.total, 0);
            }
        }
