                        <div>
                            <label class="block text-sm font-medium mb-2 text-theme-text">Cantidad recibida</label>
                            <input type="number" id="orderCashReceived" class="w-full px-4 py-3 bg-white border-2 border-theme-beige rounded-xl text-2xl text-center focus:outline-none focus:border-theme-green font-bold text-theme-text" 
                                placeholder="0" oninput="calculateOrderChange(${order.total})">
                        </div>
                        <div id="orderChangeDisplay" class="text-center p-4 rounded-xl bg-green-50 border border-green-200 hidden">
                            <p class="text-sm text-green-700 font-medium">Su Cambio</p>
                            <p class="text-3xl font-extrabold text-green-600 mt-1">$<span id="orderChangeAmount">0</span></p>
                        </div>
                        <div class="grid grid-cols-2 gap-3 pt-2">
                            <button onclick="closeModal()" class="py-3 rounded-xl bg-white hover:bg-theme-beige border border-theme-beige transition font-medium">Cancelar</button>
                            <button onclick="completeOrderCashPayment(${order.id})" id="confirmOrderPaymentBtn" class="btn-primary py-3 rounded-xl font-bold shadow-md" disabled>Confirmar Cobro</button>
                        </div>
                    </div>
                </div>
            `;
            modal.classList.remove('hidden');
            setTimeout(() => document.getElementById('orderCashReceived').focus(), 100);
        }

        function calculateOrderChange(total) {
            const received = parseFloat(document.getElementById('orderCashReceived').value) || 0;
            const change = received - total;
            const changeDisplay = document.getElementById('orderChangeDisplay');
            const changeAmount = document.getElementById('orderChangeAmount');
            const confirmBtn = document.getElementById('confirmOrderPaymentBtn');

            if (received >= total) {
                changeDisplay.classList.remove('hidden');
                changeAmount.textContent = change.toLocaleString();
                confirmBtn.disabled = false;
            } else {
                changeDisplay.classList.add('hidden');
                confirmBtn.disabled = true;
            }
        }

        function completeOrderCashPayment(orderId) {
            const order = state.orders.find(o => o.id === orderId);
            const received = parseFloat(document.getElementById('orderCashReceived').value) || 0;
            const change = received - order.total;
            processOrderPayment(order, 'cash', received, change);
            closeModal();
        }

        function processOrderPayment(order, paymentMethod, cashReceived, change) {
            order.paymentStatus = 'paid';
            order.paymentMethod = paymentMethod;

            const sale = {
                id: Date.now(),
                orderId: order.id,
                items: [...order.items],
                subtotal: order.total,
                total: order.total,
                paymentMethod,
                cashReceived: paymentMethod === 'cash' ? cashReceived : null,
                change: paymentMethod === 'cash' ? change : null,
                timestamp: new Date().toISOString(),
                cashierId: currentUser.id,
                cashierName: currentUser.name
            };

            state.sales.push(sale);

            // Descontar del inventario (Las mesas descuentan al cobrar, no al ordenar)
            order.items.forEach(cartItem => {
                const product = state.products.find(p => p.id === cartItem.productId);
                if (product && product.ingredients) {
                    product.ingredients.forEach(ing => {
                        const invItem = state.inventory.find(i => i.id === ing.id);
                        if (invItem) {
                            invItem.stock -= (ing.qty * cartItem.quantity);
                            if (invItem.stock <= invItem.minStock) {
                                addNotification('warning', `⚠️ Stock bajo: ${invItem.name}`, ['admin', 'cashier']);
                            }
                        }
                    });
                }
            });

            if (state.cashRegister.isOpen) {
                state.cashRegister.movements.push({
                    type: 'sale',
                    amount: order.total,
                    paymentMethod,
                    orderId: order.id,
                    timestamp: new Date().toISOString()
                });
            }

            logActivity('SALE_TABLE', `Cobro de pedido de mesa #${order.id.toString().slice(-4)} por $${order.total} - ${paymentMethod}`);
            
            saveToStorage();
            showToast(`Cobro completado exitosamente`, 'success');
            
            // Recargar la vista actual (para que desaparezcan los botones)
            renderView(currentView);
            
            // Mostrar ticket con opción de imprimir
            showReceipt(sale);
        }

        // ==================== TICKET HISTORY MODULE ====================
        function renderTicketHistory(container) {
            // Ordenar ventas de la más reciente a la más antigua
            const sales = state.sales.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

            container.innerHTML = `
                <div class="animate-slideIn h-full flex flex-col">
                    <h2 class="text-2xl font-bold mb-6 flex items-center gap-3 text-theme-greenDark shrink-0">🧾 Historial de Tickets</h2>
                    <div class="space-y-4 flex-1 overflow-auto scrollbar-thin pr-2 pb-4">
                        ${sales.length === 0 ? '<p class="text-theme-textMuted text-center py-12 font-medium text-lg">No hay tickets registrados aún</p>' : 
                        sales.map(sale => `
                            <div class="glass bg-white/80 border border-white rounded-2xl p-5 shadow-sm flex flex-col md:flex-row md:items-center justify-between gap-4 transition hover:shadow-md">
                                <div>
                                    <p class="font-extrabold text-theme-text text-lg">Ticket #${sale.orderId.toString().slice(-4)}</p>
                                    <p class="text-xs font-bold text-theme-textMuted mt-1">🕒 ${new Date(sale.timestamp).toLocaleString('es-MX')}</p>
                                    <p class="text-sm font-medium mt-2 text-theme-text">${sale.items.map(i => `${i.quantity}x ${i.name}`).join(', ')}</p>
                                </div>
                                <div class="text-left md:text-right flex flex-col justify-between items-start md:items-end">
                                    <p class="font-extrabold text-xl text-theme-greenDark mb-3">$${sale.total.toLocaleString()}</p>
                                    <div class="flex gap-2">
                                        <span class="px-3 py-1.5 rounded-lg text-xs font-bold shadow-sm ${sale.paymentMethod === 'cash' ? 'bg-green-100 text-green-700' : 'bg-blue-100 text-blue-700'}">
                                            ${sale.paymentMethod === 'cash' ? '💵 Efectivo' : '📱 Transferencia'}
                                        </span>
                                        <button onclick='reprintTicket(${sale.id})' class="px-3 py-1.5 rounded-lg text-xs font-bold shadow-sm bg-theme-bg border border-theme-beige hover:bg-theme-beige transition text-theme-text">
                                            🖨️ Ver Ticket
                                        </button>
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function reprintTicket(saleId) {
            const sale = state.sales.find(s => s.id === saleId);
            if (sale) {
                showReceipt(sale);
            }
        }

        // ==================== REPORTS MODULE ====================
        function renderReports(container) {
            const today = new Date().toDateString();
            const thisMonth = new Date().getMonth();
            const thisYear = new Date().getFullYear();

            const todaySales = state.sales.filter(s => new Date(s.timestamp).toDateString() === today);
            const monthSales = state.sales.filter(s => {
                const d = new Date(s.timestamp);
                return d.getMonth() === thisMonth && d.getFullYear() === thisYear;
            });

            const todayTotal = todaySales.reduce((sum, s) => sum + s.total, 0);
            const monthTotal = monthSales.reduce((sum, s) => sum + s.total, 0);
            const todayOrders = todaySales.length;
            const monthOrders = monthSales.length;
            const avgTicket = todayOrders > 0 ? todayTotal / todayOrders : 0;

            const productSales = {};
            state.sales.forEach(sale => {
                sale.items.forEach(item => {
                    if (!productSales[item.name]) productSales[item.name] = { qty: 0, total: 0 };
                    productSales[item.name].qty += item.quantity;
                    productSales[item.name].total += item.price * item.quantity;
                });
            });
            const topProducts = Object.entries(productSales)
                .sort((a, b) => b[1].qty - a[1].qty)
                .slice(0, 5);

            container.innerHTML = `
                <div class="animate-slideIn">
                    <h2 class="text-2xl font-bold mb-6 flex items-center gap-3 text-theme-greenDark">📈 Reportes Estadísticos</h2>

                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
                        <div class="glass bg-white/60 border border-white rounded-2xl p-6 shadow-sm">
                            <p class="text-theme-textMuted text-sm font-bold mb-1">Ventas Hoy</p>
                            <p class="text-3xl font-extrabold text-green-600">$${todayTotal.toLocaleString()}</p>
                            <p class="text-xs text-theme-textMuted font-medium mt-2 bg-theme-bg inline-block px-2 py-1 rounded-md border border-theme-beige">${todayOrders} tickets</p>
                        </div>
                        <div class="glass bg-white/60 border border-white rounded-2xl p-6 shadow-sm">
                            <p class="text-theme-textMuted text-sm font-bold mb-1">Ventas del Mes</p>
                            <p class="text-3xl font-extrabold text-blue-600">$${monthTotal.toLocaleString()}</p>
                            <p class="text-xs text-theme-textMuted font-medium mt-2 bg-theme-bg inline-block px-2 py-1 rounded-md border border-theme-beige">${monthOrders} tickets</p>
                        </div>
                        <div class="glass bg-white/60 border border-white rounded-2xl p-6 shadow-sm">
                            <p class="text-theme-textMuted text-sm font-bold mb-1">Ticket Promedio (hoy)</p>
                            <p class="text-3xl font-extrabold text-purple-600">$${avgTicket.toFixed(0)}</p>
                        </div>
                        <div class="glass bg-white/60 border border-white rounded-2xl p-6 shadow-sm">
                            <p class="text-theme-textMuted text-sm font-bold mb-1">Pizzas/Artículos (hoy)</p>
                            <p class="text-3xl font-extrabold text-theme-greenDark">${todaySales.reduce((sum, s) => sum + s.items.reduce((is, i) => is + i.quantity, 0), 0)}</p>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <div class="glass bg-white/60 border border-white rounded-2xl p-6 shadow-sm">
                            <h3 class="font-extrabold text-lg mb-5 text-theme-text border-b border-theme-beige pb-3">🏆 Lo Más Vendido</h3>
                            <div class="space-y-3">
                                ${topProducts.map(([name, data], i) => `
                                    <div class="flex items-center justify-between p-4 rounded-xl bg-white shadow-sm border border-theme-beige">
                                        <div class="flex items-center gap-4">
                                            <span class="text-2xl drop-shadow-sm">${['🥇', '🥈', '🥉', '4️⃣', '5️⃣'][i]}</span>
                                            <span class="font-bold text-theme-text text-lg">${name}</span>
                                        </div>
                                        <div class="text-right">
                                            <p class="font-extrabold text-theme-greenDark">${data.qty} vendidos</p>
                                            <p class="text-sm font-bold text-theme-textMuted">$${data.total.toLocaleString()}</p>
                                        </div>
                                    </div>
                                `).join('') || '<p class="text-theme-textMuted text-center font-medium py-8">Sin datos suficientes</p>'}
                            </div>
                        </div>

                        <div class="glass bg-white/60 border border-white rounded-2xl p-6 shadow-sm">
                            <h3 class="font-extrabold text-lg mb-5 text-theme-text border-b border-theme-beige pb-3">📜 Actividad Reciente</h3>
                            <div class="space-y-3 max-h-[400px] overflow-auto scrollbar-thin pr-2">
                                ${state.activityLog.slice(-20).reverse().map(log => `
                                    <div class="p-4 rounded-xl bg-white border border-theme-beige shadow-sm text-sm">
                                        <div class="flex justify-between items-start mb-2">
                                            <span class="font-extrabold text-theme-greenDark px-2 py-1 bg-green-50 rounded-md border border-green-100">${log.action}</span>
                                            <span class="text-xs font-bold text-theme-textMuted">${new Date(log.timestamp).toLocaleTimeString('es-MX')}</span>
                                        </div>
                                        <p class="text-theme-text font-medium text-[13px] mb-2">${log.details}</p>
                                        <p class="text-xs font-bold text-theme-textMuted">👤 ${log.userName}</p>
                                    </div>
                                `).join('') || '<p class="text-theme-textMuted text-center font-medium py-8">Sin actividad registrada</p>'}
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        // ==================== SETTINGS MODULE ====================
        function renderSettings(container) {
            container.innerHTML = `
                <div class="animate-slideIn">
                    <h2 class="text-2xl font-bold mb-6 flex items-center gap-3 text-theme-greenDark">⚙️ Configuración</h2>

                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <div class="glass bg-white/60 border border-white rounded-2xl p-6 shadow-sm">
                            <h3 class="font-extrabold text-lg mb-5 text-theme-text border-b border-theme-beige pb-3">💾 Gestión de Datos</h3>
                            <div class="space-y-3">
                                <button onclick="exportData()" class="w-full py-4 rounded-xl bg-blue-50 hover:bg-blue-100 text-blue-700 font-bold border border-blue-200 transition flex items-center justify-center gap-2 shadow-sm">
                                    📥 Descargar Copia de Seguridad (JSON)
                                </button>
                                <button onclick="showImportModal()" class="w-full py-4 rounded-xl bg-green-50 hover:bg-green-100 text-green-700 font-bold border border-green-200 transition flex items-center justify-center gap-2 shadow-sm">
                                    📤 Importar Datos a Firebase
                                </button>
                                <button onclick="confirmResetData()" class="w-full py-4 rounded-xl bg-red-50 hover:bg-red-100 text-red-700 font-bold border border-red-200 transition flex items-center justify-center gap-2 shadow-sm mt-6">
                                    ⚠️ Restaurar Sistema de Fábrica
                                </button>
                            </div>
                        </div>

                        <div class="glass bg-white/60 border border-white rounded-2xl p-6 shadow-sm">
                            <h3 class="font-extrabold text-lg mb-5 text-theme-text border-b border-theme-beige pb-3">ℹ️ Información del Sistema</h3>
                            <div class="space-y-3 text-sm font-medium">
                                <div class="flex justify-between p-4 rounded-xl bg-white shadow-sm border border-theme-beige">
                                    <span class="text-theme-textMuted font-bold">Base de Datos:</span>
                                    <span class="font-extrabold text-theme-greenDark bg-theme-bg px-3 py-1 rounded-lg">Cloud Firestore (En Vivo)</span>
                                </div>
                                <div class="flex justify-between p-4 rounded-xl bg-white shadow-sm border border-theme-beige">
                                    <span class="text-theme-textMuted font-bold">Usuarios registrados:</span>
                                    <span class="font-extrabold text-theme-text text-base">${state.users.length}</span>
                                </div>
                                <div class="flex justify-between p-4 rounded-xl bg-white shadow-sm border border-theme-beige">
                                    <span class="text-theme-textMuted font-bold">Productos en menú:</span>
                                    <span class="font-extrabold text-theme-text text-base">${state.products.length}</span>
                                </div>
                                <div class="flex justify-between p-4 rounded-xl bg-white shadow-sm border border-theme-beige">
                                    <span class="text-theme-textMuted font-bold">Insumos en inventario:</span>
                                    <span class="font-extrabold text-theme-text text-base">${state.inventory.length}</span>
                                </div>
                            </div>
                        </div>

                        <div class="glass bg-white/60 border border-white rounded-2xl p-6 shadow-sm">
                            <h3 class="font-extrabold text-lg mb-5 text-theme-text border-b border-theme-beige pb-3">🪑 Gestión de Mesas</h3>
                            <div class="space-y-3 max-h-60 overflow-auto scrollbar-thin pr-2 mb-4">
                                ${state.tables.map(t => `
                                    <div class="flex items-center justify-between p-3 rounded-xl bg-white shadow-sm border border-theme-beige">
                                        <span class="font-bold text-theme-text">${t.name} <span class="text-theme-textMuted text-xs font-medium ml-1">(${t.capacity} pers.)</span></span>
                                        <span class="px-3 py-1 rounded-full text-xs font-bold text-white shadow-sm ${t.status === 'occupied' ? 'bg-orange-400' : 'bg-green-400'}">${t.status === 'occupied' ? 'Ocupada' : 'Libre'}</span>
                                    </div>
                                `).join('')}
                            </div>
                            <button onclick="addTable()" class="w-full py-3 rounded-xl bg-theme-bg hover:bg-theme-beige border border-theme-beige font-bold text-theme-text transition text-sm shadow-sm">
                                ➕ Agregar Nueva Mesa
                            </button>
                        </div>

                        <div class="glass bg-white/60 border border-white rounded-2xl p-6 shadow-sm">
                            <h3 class="font-extrabold text-lg mb-5 text-theme-text border-b border-theme-beige pb-3">📞 Catálogo de Proveedores</h3>
                            <div class="space-y-3 max-h-80 overflow-auto scrollbar-thin pr-2">
                                ${state.suppliers.map(s => `
                                    <div class="p-4 rounded-xl bg-white shadow-sm border border-theme-beige">
                                        <p class="font-extrabold text-theme-greenDark text-lg mb-1">${s.name}</p>
                                        <p class="text-sm font-medium text-theme-textMuted flex gap-2"><span class="w-4">📞</span> ${s.contact}</p>
                                        <p class="text-sm font-medium text-theme-textMuted flex gap-2"><span class="w-4">✉️</span> ${s.email}</p>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function exportData() {
            const dataStr = JSON.stringify(state, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `pizzamanager_backup_${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('Datos exportados correctamente', 'success');
        }

        function showImportModal() {
            const modal = document.getElementById('modalContainer');
            modal.innerHTML = `
                <div class="glass bg-white/90 rounded-3xl p-6 w-full max-w-md animate-slideIn shadow-2xl border-2 border-white">
                    <h3 class="text-xl font-bold mb-4 text-theme-greenDark">📤 Importar Datos</h3>
                    <div class="space-y-4">
                        <p class="text-sm text-theme-textMuted font-medium">Selecciona un archivo JSON exportado anteriormente. Esto reemplazará todos los datos en la base de datos de Firebase.</p>
                        <input type="file" id="importFile" accept=".json" class="w-full px-4 py-3 bg-white border border-theme-beige rounded-xl focus:outline-none focus:border-theme-green font-medium">
                        <div class="grid grid-cols-2 gap-3 pt-2">
                            <button onclick="closeModal()" class="py-3 rounded-xl bg-white hover:bg-theme-beige border border-theme-beige transition font-bold text-theme-text">Cancelar</button>
                            <button onclick="importData()" class="btn-primary py-3 rounded-xl font-bold shadow-md">Importar a la Nube</button>
                        </div>
                    </div>
                </div>
            `;
            modal.classList.remove('hidden');
        }

        function importData() {
            const file = document.getElementById('importFile').files[0];
            if (!file) {
                showToast('Selecciona un archivo', 'warning');
                return;
            }

            const reader = new FileReader();
            reader.onload = function (e) {
                try {
                    const imported = JSON.parse(e.target.result);
                    state = { ...DEFAULT_DATA, ...imported };
                    saveToStorage();
                    showToast('Datos importados a Firebase exitosamente', 'success');
                    closeModal();
                    renderView(currentView);
                } catch (err) {
                    showToast('Error al importar: archivo inválido', 'error');
                }
            };
            reader.readAsText(file);
        }

        function confirmResetData() {
            const modal = document.getElementById('modalContainer');
            modal.innerHTML = `
                <div class="glass bg-white/90 rounded-3xl p-6 w-full max-w-md animate-slideIn shadow-2xl border-2 border-red-200">
                    <h3 class="text-xl font-extrabold mb-4 text-red-600">⚠️ Restaurar Datos</h3>
                    <p class="text-theme-text font-medium mb-6">¿Estás seguro de que quieres restaurar todos los datos a los valores predeterminados? Esta acción eliminará los datos en Firebase de manera permanente.</p>
                    <div class="grid grid-cols-2 gap-3">
                        <button onclick="closeModal()" class="py-3 rounded-xl bg-white hover:bg-theme-beige border border-theme-beige transition font-bold text-theme-text">Cancelar</button>
                        <button onclick="resetData()" class="bg-red-500 hover:bg-red-600 text-white font-bold py-3 rounded-xl shadow-md transition">Sí, Restaurar Todo</button>
                    </div>
                </div>
            `;
            modal.classList.remove('hidden');
        }

        function resetData() {
            state = JSON.parse(JSON.stringify(DEFAULT_DATA));
            saveToStorage();
            showToast('Datos restaurados correctamente', 'success');
            closeModal();
            renderView(currentView);
        }

        function addTable() {
            const nextNum = state.tables.length + 1;
            state.tables.push({
                id: Date.now(),
                name: `Mesa ${nextNum}`,
                capacity: 4,
                status: 'free'
            });
            saveToStorage();
            showToast('Mesa agregada correctamente', 'success');
            renderSettings(document.getElementById('contentArea'));
        }

        // ==================== INITIALIZATION ====================
        document.addEventListener('DOMContentLoaded', async function () {
            // Cargar de Firebase en vez de localStorage
            await loadFromStorage();

            // Remover pantalla de carga y mostrar login/app
            const loadingScreen = document.getElementById('loadingScreen');
            if (loadingScreen) loadingScreen.classList.add('hidden');

            checkSession();

            // Handle Enter key on login
            document.getElementById('loginPass')?.addEventListener('keypress', function (e) {
                if (e.key === 'Enter') handleLogin();
            });
            document.getElementById('loginUser')?.addEventListener('keypress', function (e) {
                if (e.key === 'Enter') document.getElementById('loginPass').focus();
            });

            // Close notifications panel when clicking outside
            document.addEventListener('click', function (e) {
                const notifPanel = document.getElementById('notifPanel');
                const notifBell = document.getElementById('notificationBell');
                if (notifPanel && notifBell && !notifPanel.contains(e.target) && !notifBell.contains(e.target)) {
                    notifPanel.classList.add('hidden');
                }
            });
        });
    </script>
</body>

</html>
