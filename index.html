                { id: 3, name: 'Salsas Italianas', contact: '555-0103', email: 'pedidos@salsasitalianas.com' },

            ],
            tables: [
                { id: 1, name: 'Mesa 1', capacity: 4, status: 'free' },
                { id: 2, name: 'Mesa 2', capacity: 4, status: 'free' },
                { id: 3, name: 'Mesa 3', capacity: 6, status: 'free' },
                { id: 4, name: 'Mesa 4', capacity: 6, status: 'free' },
                { id: 5, name: 'Mesa 5', capacity: 2, status: 'free' },
                { id: 6, name: 'Mesa 6', capacity: 2, status: 'free' },
                { id: 7, name: 'Mesa 7', capacity: 8, status: 'free' },
                { id: 8, name: 'Mesa 8', capacity: 4, status: 'free' }
            ],
            orders: [],
            sales: [],
            cashRegister: { isOpen: false, openedBy: null, openedAt: null, initialAmount: 0, movements: [] },
            inventoryMovements: [],
            activityLog: [],
            notifications: []
        };

        // ==================== STATE MANAGEMENT ====================
        let state = {};
        let currentUser = null;
        let currentView = 'pos';
        let currentCart = [];
        let selectedTable = null;

        // Firebase Sync Functions
        async function saveToStorage() {
            try {
                // Guardamos todo el estado en un documento de Firestore
                await db.collection('pizzaManager').doc('state').set(state);
            } catch (error) {
                console.error("Error al guardar en Firebase:", error);
                showToast('Error al guardar datos', 'error');
            }
        }

        function loadFromStorage() {
            return new Promise((resolve) => {
                // onSnapshot permite escuchar los cambios de la BD en tiempo real
                db.collection('pizzaManager').doc('state').onSnapshot((doc) => {
                    if (doc.exists) {
                        state = { ...DEFAULT_DATA, ...doc.data() };
                        
                        // Si un usuario ya inició sesión, re-renderizar vistas colaborativas
                        if (currentUser) {
                            if (currentView === 'kitchen' || currentView === 'orders' || currentView === 'waiter') {
                                renderView(currentView);
                            }
                            updateNotificationBadge();
                        }
                    } else {
                        // Inicialización primera vez
                        state = JSON.parse(JSON.stringify(DEFAULT_DATA));
                        saveToStorage();
                    }
                    resolve();
                }, (error) => {
                    console.error("Error de Firebase:", error);
                    if (Object.keys(state).length === 0) {
                        state = JSON.parse(JSON.stringify(DEFAULT_DATA));
                    }
                    resolve();
                });
            });
        }

        function logActivity(action, details) {
            state.activityLog.push({
                id: Date.now(),
                userId: currentUser?.id,
                userName: currentUser?.name,
                action,
                details,
                timestamp: new Date().toISOString()
            });
            saveToStorage();
        }

        function addNotification(type, message, forRoles = []) {
            const notif = {
                id: Date.now(),
                type,
                message,
                forRoles,
                timestamp: new Date().toISOString(),
                read: false
            };
            state.notifications.unshift(notif);
            if (state.notifications.length > 50) state.notifications.pop();
            saveToStorage();
            updateNotificationBadge();
        }

        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            const colors = {
                success: 'bg-green-500',
                error: 'bg-red-500',
                warning: 'bg-yellow-500',
                info: 'bg-blue-500'
            };
            toast.className = `toast ${colors[type]} text-white px-6 py-3 rounded-xl shadow-lg flex items-center gap-2`;
            const icons = { success: '✅', error: '❌', warning: '⚠️', info: 'ℹ️' };
            toast.innerHTML = `<span>${icons[type]}</span><span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }

        // ==================== AUTHENTICATION ====================
        function handleLogin() {
            const username = document.getElementById('loginUser').value;
            const password = document.getElementById('loginPass').value;
            const errorDiv = document.getElementById('loginError');

            const user = state.users.find(u => u.username === username && u.password === password && u.active);
            
            if (user) {
                currentUser = user;
                localStorage.setItem('currentUser', JSON.stringify(user)); // Se queda en local por conveniencia de sesión
                logActivity('LOGIN', `Usuario ${user.name} inició sesión`);
                errorDiv.classList.add('hidden');
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
                initMainApp();
            } else {
                errorDiv.textContent = 'Usuario o contraseña incorrectos';
                errorDiv.classList.remove('hidden');
                document.getElementById('loginUser').parentElement.classList.add('animate-shake');
                setTimeout(() => document.getElementById('loginUser').parentElement.classList.remove('animate-shake'), 500);
            }
        }

        function handleLogout() {
            logActivity('LOGOUT', `Usuario ${currentUser.name} cerró sesión`);
            currentUser = null;
            localStorage.removeItem('currentUser');
            document.getElementById('mainApp').classList.add('hidden');
            document.getElementById('loginScreen').classList.remove('hidden');
            document.getElementById('loginUser').value = '';
            document.getElementById('loginPass').value = '';
        }

        function checkSession() {
            const savedUser = localStorage.getItem('currentUser');
            if (savedUser) {
                currentUser = JSON.parse(savedUser);
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
                initMainApp();
            } else {
                document.getElementById('loginScreen').classList.remove('hidden');
            }
        }

        // ==================== MAIN APP INITIALIZATION ====================
        function initMainApp() {
            document.getElementById('userName').textContent = currentUser.name;
            const roleNames = { admin: 'Administrador', cashier: 'Cajero', kitchen: 'Cocina', waiter: 'Mesero' };
            const roleIcons = { admin: '👨‍💼', cashier: '💰', kitchen: '👨‍🍳', waiter: '🍽️' };
            document.getElementById('userRole').textContent = roleNames[currentUser.role];
            document.getElementById('userIcon').textContent = roleIcons[currentUser.role];
            
            renderNavigation();
            updateDateTime();
            setInterval(updateDateTime, 1000);
            updateNotificationBadge();

            const defaultViews = { admin: 'dashboard', cashier: 'pos', kitchen: 'kitchen', waiter: 'waiter' };
            currentView = defaultViews[currentUser.role];
            renderView(currentView);
        }

        function updateDateTime() {
            const now = new Date();
            document.getElementById('currentDateTime').textContent = now.toLocaleString('es-MX', {
                weekday: 'long', day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit'
            });
        }

        function updateNotificationBadge() {
            const relevant = state.notifications.filter(n => 
                !n.read && (n.forRoles.length === 0 || n.forRoles.includes(currentUser.role))
            );
            const badge = document.getElementById('notifCount');
            if (relevant.length > 0) {
                badge.textContent = relevant.length;
                badge.classList.remove('hidden');
            } else {
                badge.classList.add('hidden');
            }
        }

        function toggleNotifications() {
            const panel = document.getElementById('notifPanel');
            panel.classList.toggle('hidden');
            if (!panel.classList.contains('hidden')) {
                renderNotifications();
            }
        }

        function renderNotifications() {
            const list = document.getElementById('notifList');
            const relevant = state.notifications.filter(n => 
                n.forRoles.length === 0 || n.forRoles.includes(currentUser.role)
            ).slice(0, 20);

            if (relevant.length === 0) {
                list.innerHTML = '<p class="text-gray-400 text-sm text-center py-4">Sin notificaciones</p>';
                return;
            }

            list.innerHTML = relevant.map(n => `
                <div class="p-3 rounded-lg ${n.read ? 'bg-white/5' : 'bg-white/15'} text-sm cursor-pointer hover:bg-white/20 transition" onclick="markNotifRead(${n.id})">
                    <p class="${n.read ? 'text-gray-400' : 'text-white'}">${n.message}</p>
                    <p class="text-xs text-gray-500 mt-1">${new Date(n.timestamp).toLocaleString('es-MX')}</p>
                </div>
            `).join('');
        }

        function markNotifRead(id) {
            const notif = state.notifications.find(n => n.id === id);
            if (notif) {
                notif.read = true;
                saveToStorage();
                updateNotificationBadge();
                renderNotifications();
            }
        }

        // ==================== NAVIGATION ====================
        function renderNavigation() {
            const nav = document.getElementById('mainNav');
            const navItems = {
                admin: [
                    { id: 'dashboard', icon: '📊', label: 'Dashboard' },
                    { id: 'pos', icon: '🛒', label: 'Punto de Venta' },
                    { id: 'kitchen', icon: '👨‍🍳', label: 'Cocina' },
                    { id: 'waiter', icon: '🍽️', label: 'Meseros' },
                    { id: 'inventory', icon: '📦', label: 'Inventario' },
                    { id: 'products', icon: '🍕', label: 'Productos' },
                    { id: 'users', icon: '👥', label: 'Usuarios' },
                    { id: 'reports', icon: '📈', label: 'Reportes' },
                    { id: 'settings', icon: '⚙️', label: 'Configuración' }
                ],
                cashier: [
                    { id: 'pos', icon: '🛒', label: 'Punto de Venta' },
                    { id: 'orders', icon: '📋', label: 'Pedidos' },
                    { id: 'cashregister', icon: '💵', label: 'Caja' }
                ],
                kitchen: [
                    { id: 'kitchen', icon: '👨‍🍳', label: 'Cocina' }
                ],
                waiter: [
                    { id: 'waiter', icon: '🍽️', label: 'Mesas' },
                    { id: 'myorders', icon: '📋', label: 'Mis Pedidos' }
                ]
            };

            const items = navItems[currentUser.role] || [];
            nav.querySelector('div').innerHTML = items.map(item => `
                <button onclick="renderView('${item.id}')" id="nav-${item.id}" 
                    class="flex items-center gap-2 px-4 py-2 rounded-xl transition whitespace-nowrap
                    ${currentView === item.id ? 'bg-pizza-red text-white' : 'hover:bg-white/10 text-gray-300'}">
                    <span>${item.icon}</span>
                    <span class="text-sm font-medium">${item.label}</span>
                </button>
            `).join('');
        }

        function renderView(viewId) {
            currentView = viewId;
            if(document.getElementById('mainNav')) renderNavigation();
            const content = document.getElementById('contentArea');
            if(!content) return;
            
            const views = {
                dashboard: renderDashboard,
                pos: renderPOS,
                kitchen: renderKitchen,
                waiter: renderWaiter,
                inventory: renderInventory,
                products: renderProducts,
                users: renderUsers,
                reports: renderReports,
                settings: renderSettings,
                orders: renderOrders,
                cashregister: renderCashRegister,
                myorders: renderMyOrders
            };

            if (views[viewId]) {
                views[viewId](content);
            }
        }

        // ==================== DASHBOARD ====================
        function renderDashboard(container) {
            const today = new Date().toDateString();
            const todaySales = state.sales.filter(s => new Date(s.timestamp).toDateString() === today);
            const totalToday = todaySales.reduce((sum, s) => sum + s.total, 0);

            const pendingOrders = state.orders.filter(o => o.status !== 'delivered' && o.status !== 'cancelled').length;
            const lowStockItems = state.inventory.filter(i => i.stock <= i.minStock).length;

            container.innerHTML = `
                <div class="animate-slideIn">
                    <h2 class="text-2xl font-bold mb-6 flex items-center gap-3">📊 Dashboard <span class="text-sm font-normal text-gray-400">Resumen del día</span></h2>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
                        <div class="glass rounded-2xl p-5 card-hover">
                            <div class="flex items-center justify-between">
                                <div>
                                    <p class="text-gray-400 text-sm">Ventas Hoy</p>
                                    <p class="text-3xl font-bold text-green-400">$${totalToday.toLocaleString()}</p>
                                </div>
                                <span class="text-4xl">💰</span>
                            </div>
                            <p class="text-xs text-gray-500 mt-2">${todaySales.length} transacciones</p>
                        </div>
                        <div class="glass rounded-2xl p-5 card-hover">
                            <div class="flex items-center justify-between">

                                    <p class="text-3xl font-bold text-blue-400">${ordersToday}</p>
                                </div>
                                <span class="text-4xl">📋</span>
                            </div>
                            <p class="text-xs text-gray-500 mt-2">${pendingOrders} pendientes</p>
                        </div>
                        <div class="glass rounded-2xl p-5 card-hover">
                            <div class="flex items-center justify-between">
                                <div>
                                    <p class="text-gray-400 text-sm">Productos</p>
                                    <p class="text-3xl font-bold text-purple-400">${state.products.filter(p => p.active).length}</p>
                                </div>
                                <span class="text-4xl">🍕</span>
                            </div>
                            <p class="text-xs text-gray-500 mt-2">activos en menú</p>
                        </div>
                        <div class="glass rounded-2xl p-5 card-hover ${lowStockItems > 0 ? 'border-2 border-red-500' : ''}">
                            <div class="flex items-center justify-between">
                                <div>
                                    <p class="text-gray-400 text-sm">Stock Bajo</p>
                                    <p class="text-3xl font-bold ${lowStockItems > 0 ? 'text-red-400' : 'text-green-400'}">${lowStockItems}</p>
                                </div>
                                <span class="text-4xl">${lowStockItems > 0 ? '⚠️' : '✅'}</span>
                            </div>
                            <p class="text-xs text-gray-500 mt-2">insumos por reabastecer</p>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <div class="glass rounded-2xl p-5">
                            <h3 class="font-bold mb-4 flex items-center gap-2">🔥 Pedidos Activos</h3>
                            <div class="space-y-3 max-h-80 overflow-auto scrollbar-thin">
                                ${state.orders.filter(o => o.status !== 'delivered' && o.status !== 'cancelled').slice(0, 10).map(o => `
                                    <div class="flex items-center justify-between p-3 rounded-xl bg-white/5">
                                        <div>
                                            <p class="font-medium">#${o.id} - ${o.type === 'table' ? `Mesa ${o.tableId}` : 'Mostrador'}</p>
                                            <p class="text-xs text-gray-400">${o.items.length} productos • $${o.total}</p>
                                        </div>
                                        <span class="px-3 py-1 rounded-full text-xs font-medium ${getStatusClass(o.status)}">${getStatusLabel(o.status)}</span>
                                    </div>
                                `).join('') || '<p class="text-gray-400 text-center py-4">Sin pedidos activos</p>'}
                            </div>
                        </div>

                        <div class="glass rounded-2xl p-5">
                            <h3 class="font-bold mb-4 flex items-center gap-2">📦 Alertas de Inventario</h3>
                            <div class="space-y-3 max-h-80 overflow-auto scrollbar-thin">
                                ${state.inventory.filter(i => i.stock <= i.minStock).map(i => `
                                    <div class="flex items-center justify-between p-3 rounded-xl bg-red-500/20 border border-red-500/30">
                                        <div>
                                            <p class="font-medium">${i.name}</p>
                                            <p class="text-xs text-gray-400">Proveedor: ${i.supplier}</p>
                                        </div>
                                        <div class="text-right">
                                            <p class="text-red-400 font-bold">${i.stock} ${i.unit}</p>

        function getStatusClass(status) {
            const classes = {
                pending: 'status-pending text-black',
                preparing: 'status-preparing text-white',
                ready: 'status-ready text-white',
                delivered: 'status-delivered text-white',
                cancelled: 'bg-gray-500 text-white'
            };
            return classes[status] || 'bg-gray-500';
        }

        function getStatusLabel(status) {
            const labels = { pending: 'Pendiente', preparing: 'Preparando', ready: 'Listo', delivered: 'Entregado', cancelled: 'Cancelado' };
            return labels[status] || status;
        }

        // ==================== POS (Point of Sale) ====================
        function renderPOS(container) {
            const categories = [
                { id: 'all', name: 'Todo', icon: '🍽️' },
                { id: 'pizza', name: 'Pizzas', icon: '🍕' },
                { id: 'drink', name: 'Bebidas', icon: '🥤' },
                { id: 'extra', name: 'Extras', icon: '🍟' },
                { id: 'promo', name: 'Promociones', icon: '🎉' }
            ];

            container.innerHTML = `
                <div class="animate-slideIn h-full flex flex-col lg:flex-row gap-4">
                    <div class="flex-1 flex flex-col min-h-0">
                        <div class="flex items-center justify-between mb-4">
                            <h2 class="text-xl font-bold flex items-center gap-2">🛒 Punto de Venta</h2>
                            <div class="flex gap-2">
                                ${categories.map(c => `
                                    <button onclick="filterPOSProducts('${c.id}')" id="cat-${c.id}" 
                                        class="px-3 py-2 rounded-xl text-sm transition ${c.id === 'all' ? 'bg-pizza-red' : 'bg-white/10 hover:bg-white/20'}">
                                        ${c.icon} ${c.name}
                                    </button>
                                `).join('')}
                            </div>
                        </div>
                        <div id="posProducts" class="grid grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-3 overflow-auto flex-1 scrollbar-thin pb-4">
                            ${renderPOSProducts('all')}
                        </div>
                    </div>

                    <div class="w-full lg:w-96 glass rounded-2xl p-4 flex flex-col">
                        <div class="flex items-center justify-between mb-4">
                            <h3 class="font-bold flex items-center gap-2">🧾 Cuenta</h3>
                            <button onclick="clearCart()" class="text-xs text-red-400 hover:text-red-300">Limpiar</button>
                        </div>
                        <div id="cartItems" class="flex-1 overflow-auto scrollbar-thin space-y-2 mb-4">
                            ${renderCartItems()}
                        </div>
                        <div class="border-t border-white/20 pt-4 space-y-3">
                            <div class="flex justify-between text-lg">
                                <span>Subtotal:</span>
                                <span id="cartSubtotal">$${calculateCartTotal().toLocaleString()}</span>
                            </div>
                            <div class="flex justify-between text-2xl font-bold text-pizza-yellow">
                                <span>Total:</span>
                                <span id="cartTotal">$${calculateCartTotal().toLocaleString()}</span>
                            </div>
                            <div class="grid grid-cols-2 gap-2">
                                <button onclick="processPayment('cash')" class="btn-primary py-3 rounded-xl font-medium flex items-center justify-center gap-2" ${currentCart.length === 0 ? 'disabled' : ''}>
                                    💵 Efectivo
                                </button>
                                <button onclick="processPayment('transfer')" class="bg-blue-600 hover:bg-blue-700 py-3 rounded-xl font-medium flex items-center justify-center gap-2 transition" ${currentCart.length === 0 ? 'disabled' : ''}>
                                    📱 Transferencia
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderPOSProducts(category) {
            const filtered = category === 'all' 
                ? state.products.filter(p => p.active)
                : state.products.filter(p => p.active && p.category === category);

            return filtered.map(p => {
                const categoryIcons = { pizza: '🍕', drink: '🥤', extra: '🍟', promo: '🎉' };
                // Usamos el icono personalizado del producto, o el de la categoría por defecto
                const displayIcon = p.icon || categoryIcons[p.category] || '🍽️';
                
                return `
                    <div onclick="addToCart(${p.id})" 
                        class="glass rounded-xl p-4 cursor-pointer card-hover hover:border-pizza-orange border border-transparent">
                        <div class="text-3xl mb-2">${displayIcon}</div>
                        <h4 class="font-medium text-sm mb-1 line-clamp-2">${p.name}</h4>
                        <p class="text-pizza-yellow font-bold">$${p.price}</p>
                    </div>
                `;
            }).join('') || '<p class="col-span-full text-center text-gray-400 py-8">No hay productos en esta categoría</p>';
        }

        function filterPOSProducts(category) {
            document.querySelectorAll('[id^="cat-"]').forEach(btn => {
                btn.classList.remove('bg-pizza-red');
                btn.classList.add('bg-white/10');
            });
            document.getElementById(`cat-${category}`).classList.remove('bg-white/10');
            document.getElementById(`cat-${category}`).classList.add('bg-pizza-red');
            document.getElementById('posProducts').innerHTML = renderPOSProducts(category);
        }

        function addToCart(productId) {
            const product = state.products.find(p => p.id === productId);
            if (!product) return;

            const existing = currentCart.find(item => item.productId === productId);
            if (existing) {
                existing.quantity++;
            } else {
                currentCart.push({ productId, name: product.name, price: product.price, quantity: 1 });
            }
            updateCartDisplay();
            showToast(`${product.name} agregado`, 'success');
        }

        function removeFromCart(productId) {
            currentCart = currentCart.filter(item => item.productId !== productId);
            updateCartDisplay();
        }

        function updateCartItemQty(productId, delta) {
            const item = currentCart.find(i => i.productId === productId);
            if (item) {
                item.quantity += delta;
                if (item.quantity <= 0) {
                    removeFromCart(productId);
                } else {
                    updateCartDisplay();
                }
            }
        }

        function clearCart() {
            currentCart = [];
            updateCartDisplay();
        }

        function renderCartItems() {
            if (currentCart.length === 0) {
                return '<p class="text-gray-400 text-center py-8">Carrito vacío</p>';
            }
            return currentCart.map(item => `
                <div class="flex items-center justify-between p-3 rounded-xl bg-white/5">
                    <div class="flex-1">
                        <p class="font-medium text-sm">${item.name}</p>
                        <p class="text-pizza-yellow text-sm">$${item.price} c/u</p>
                    </div>
                    <div class="flex items-center gap-2">
                        <button onclick="updateCartItemQty(${item.productId}, -1)" class="w-7 h-7 rounded-full bg-white/10 hover:bg-white/20 transition">-</button>
                        <span class="w-8 text-center">${item.quantity}</span>
                        <button onclick="updateCartItemQty(${item.productId}, 1)" class="w-7 h-7 rounded-full bg-white/10 hover:bg-white/20 transition">+</button>
                        <button onclick="removeFromCart(${item.productId})" class="text-red-400 hover:text-red-300 ml-2">🗑️</button>
                    </div>
                </div>
            `).join('');
        }

        function calculateCartTotal() {
            return currentCart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
        }

        function updateCartDisplay() {
            const cartItemsEl = document.getElementById('cartItems');
            const subtotalEl = document.getElementById('cartSubtotal');
            const totalEl = document.getElementById('cartTotal');
            
            if (cartItemsEl) cartItemsEl.innerHTML = renderCartItems();
            const total = calculateCartTotal();
            if (subtotalEl) subtotalEl.textContent = `$${total.toLocaleString()}`;
            if (totalEl) totalEl.textContent = `$${total.toLocaleString()}`;
        }

        function processPayment(method) {
            if (currentCart.length === 0) {
                showToast('El carrito está vacío', 'warning');
                return;
            }

            if (!state.cashRegister.isOpen && currentUser.role !== 'admin') {
                showToast('La caja no está abierta', 'error');
                return;
            }

            const total = calculateCartTotal();
            
            if (method === 'cash') {
                showCashPaymentModal(total);
            } else {
                completeSale(method, total, 0);
            }
        }

        function showCashPaymentModal(total) {
            const modal = document.getElementById('modalContainer');
            modal.innerHTML = `
                <div class="glass rounded-2xl p-6 w-full max-w-md animate-slideIn">
                    <h3 class="text-xl font-bold mb-4 flex items-center gap-2">💵 Pago en Efectivo</h3>
                    <div class="space-y-4">
                        <div class="text-center p-4 rounded-xl bg-pizza-yellow/20">
                            <p class="text-sm text-gray-300">Total a pagar</p>
                            <p class="text-4xl font-bold text-pizza-yellow">$${total.toLocaleString()}</p>
                        </div>
                        <div>
                            <label class="block text-sm mb-2">Cantidad recibida</label>
                            <input type="number" id="cashReceived" class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-xl text-2xl text-center" 
                                placeholder="0" oninput="calculateChange(${total})">
                        </div>
                        <div id="changeDisplay" class="text-center p-4 rounded-xl bg-green-500/20 hidden">
                            <p class="text-sm text-gray-300">Cambio</p>
                            <p class="text-3xl font-bold text-green-400">$<span id="changeAmount">0</span></p>
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <button onclick="closeModal()" class="py-3 rounded-xl bg-white/10 hover:bg-white/20 transition">Cancelar</button>
                            <button onclick="completeCashPayment(${total})" id="confirmPaymentBtn" class="btn-primary py-3 rounded-xl" disabled>Confirmar</button>
                        </div>
                    </div>
                </div>
            `;
            modal.classList.remove('hidden');
        }

        function calculateChange(total) {
            const received = parseFloat(document.getElementById('cashReceived').value) || 0;
            const change = received - total;
            const changeDisplay = document.getElementById('changeDisplay');
            const changeAmount = document.getElementById('changeAmount');
            const confirmBtn = document.getElementById('confirmPaymentBtn');

            if (received >= total) {
                changeDisplay.classList.remove('hidden');
                changeAmount.textContent = change.toLocaleString();
                confirmBtn.disabled = false;
            } else {
                changeDisplay.classList.add('hidden');
                confirmBtn.disabled = true;
            }
        }

        function completeCashPayment(total) {
            const received = parseFloat(document.getElementById('cashReceived').value) || 0;
            const change = received - total;
            completeSale('cash', total, change);
            closeModal();
        }

        function completeSale(paymentMethod, total, change) {
            const orderId = Date.now();
            const order = {
                id: orderId,
                type: 'counter',
                items: [...currentCart],
                total,
                status: 'pending',
                paymentMethod,
                paymentStatus: 'paid',
                createdAt: new Date().toISOString(),
                createdBy: currentUser.id,
                tableId: null
            };

            state.orders.push(order);

            const sale = {
                id: Date.now(),
                orderId,
                items: [...currentCart],
                subtotal: total,
                total,
                paymentMethod,
                cashReceived: paymentMethod === 'cash' ? total + change : null,
                change: paymentMethod === 'cash' ? change : null,
                timestamp: new Date().toISOString(),
                cashierId: currentUser.id,
                cashierName: currentUser.name
            };

            state.sales.push(sale);

            // Deduct inventory
            currentCart.forEach(cartItem => {
                const product = state.products.find(p => p.id === cartItem.productId);
                if (product && product.ingredients) {
                    product.ingredients.forEach(ing => {
                        const invItem = state.inventory.find(i => i.id === ing.id);
                        if (invItem) {
                            invItem.stock -= ing.qty * cartItem.quantity;
                            if (invItem.stock <= invItem.minStock) {
                                addNotification('warning', `⚠️ Stock bajo: ${invItem.name}`, ['admin', 'cashier']);
                            }
                        }
                    });
                }
            });

            if (state.cashRegister.isOpen) {
                state.cashRegister.movements.push({
                    type: 'sale',
                    amount: total,
                    paymentMethod,
                    orderId,
                    timestamp: new Date().toISOString()
                });
            }

            logActivity('SALE', `Venta #${orderId} por $${total} - ${paymentMethod}`);
            addNotification('info', `🍕 Nuevo pedido #${orderId}`, ['kitchen']);
            
            saveToStorage();
            showToast(`Venta completada - Ticket #${orderId}`, 'success');
            showReceipt(sale);
            
            currentCart = [];
            updateCartDisplay();
        }

        function showReceipt(sale) {
            const modal = document.getElementById('modalContainer');
            modal.innerHTML = `
                <div class="bg-white text-black rounded-2xl p-6 w-full max-w-sm animate-slideIn">
                    <div class="text-center border-b border-gray-300 pb-4 mb-4">
                        <p class="text-4xl mb-2">🍕</p>
                        <h3 class="text-xl font-bold">PIZZERÍA</h3>
                        <p class="text-sm text-gray-500">Ticket de Venta</p>
                        <p class="text-xs text-gray-400">${new Date(sale.timestamp).toLocaleString('es-MX')}</p>
                    </div>
                    <div class="space-y-2 mb-4 text-sm">
                        ${sale.items.map(item => `
                            <div class="flex justify-between">
                                <span>${item.quantity}x ${item.name}</span>
                                <span>$${(item.price * item.quantity).toLocaleString()}</span>
                            </div>
                        `).join('')}
                    </div>
                    <div class="border-t border-gray-300 pt-4 space-y-2">
                        <div class="flex justify-between font-bold text-lg">
                            <span>TOTAL:</span>
                            <span>$${sale.total.toLocaleString()}</span>
                        </div>
                        ${sale.paymentMethod === 'cash' ? `
                            <div class="flex justify-between text-sm">
                                <span>Efectivo:</span>
                                <span>$${sale.cashReceived?.toLocaleString()}</span>
                            </div>
                            <div class="flex justify-between text-sm">
                                <span>Cambio:</span>
                                <span>$${sale.change?.toLocaleString()}</span>
                            </div>
                        ` : `
                            <div class="flex justify-between text-sm">
                                <span>Método:</span>
                                <span>Transferencia</span>
                            </div>
                        `}
                    </div>
                    <div class="text-center mt-4 pt-4 border-t border-gray-300">
                        <p class="text-xs text-gray-500">¡Gracias por su compra!</p>
                        <p class="text-xs text-gray-400">Ticket #${sale.orderId}</p>
                    </div>
                    <button onclick="closeModal()" class="w-full mt-4 py-3 bg-gray-800 text-white rounded-xl hover:bg-gray-700 transition">
                        Cerrar
                    </button>
                </div>
            `;
            modal.classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('modalContainer').classList.add('hidden');
        }

        // ==================== KITCHEN MODULE ====================
        // ==================== KITCHEN MODULE ====================
        let currentKitchenTab = 'active'; // Variable para controlar la pestaña actual

        function renderKitchen(container, tab = currentKitchenTab) {
            currentKitchenTab = tab;
            const today = new Date().toDateString();
            
            // Filtrar pedidos del día de hoy
            const allTodayOrders = state.orders.filter(o => new Date(o.createdAt).toDateString() === today);
            
            // Separar entre pendientes y terminados
            const pendingOrders = allTodayOrders.filter(o => o.status !== 'delivered' && o.status !== 'cancelled')
                .sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt));
                
            const historyOrders = allTodayOrders.filter(o => o.status === 'delivered' || o.status === 'ready' || o.status === 'cancelled')
                .sort((a, b) => new Date(b.statusUpdatedAt || b.createdAt) - new Date(a.statusUpdatedAt || a.createdAt));

            const displayOrders = tab === 'active' ? pendingOrders : historyOrders;

            container.innerHTML = `
                <div class="animate-slideIn h-full flex flex-col">
                    <div class="flex flex-col md:flex-row items-start md:items-center justify-between mb-6 gap-4 shrink-0">
                        <div class="flex flex-col md:flex-row items-start md:items-center gap-4">
                            <h2 class="text-2xl font-bold flex items-center gap-3">👨‍🍳 Cocina</h2>
                            
                            <div class="flex bg-white/5 p-1 rounded-xl border border-white/10">
                                <button onclick="renderKitchen(document.getElementById('contentArea'), 'active')" 
                                    class="${tab === 'active' ? 'bg-pizza-red text-white shadow-lg' : 'text-gray-400 hover:text-white'} px-4 py-2 rounded-lg text-sm transition font-medium">
                                    🔥 Activos (${pendingOrders.length})
                                </button>
                                <button onclick="renderKitchen(document.getElementById('contentArea'), 'history')" 
                                    class="${tab === 'history' ? 'bg-pizza-red text-white shadow-lg' : 'text-gray-400 hover:text-white'} px-4 py-2 rounded-lg text-sm transition font-medium">
                                    📜 Historial (${historyOrders.length})
                                </button>
                            </div>
                        </div>
                        
                        <button onclick="showKitchenReportModal()" class="btn-primary px-5 py-2.5 rounded-xl flex items-center gap-2 text-sm font-bold shadow-lg">
                            📝 Reporte del Día
                        </button>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 overflow-auto pb-4 scrollbar-thin">
                        ${displayOrders.map(order => {
                            const isHistory = tab === 'history';
                            // Calcular tiempo de espera. Si está en historial, usa el tiempo en que se terminó.
                            const endTime = order.statusUpdatedAt ? new Date(order.statusUpdatedAt) : new Date();
                            const waitTime = Math.floor((endTime - new Date(order.createdAt)) / 60000);
                                
                            return `
                                <div class="glass rounded-2xl p-4 flex flex-col ${isHistory ? 'opacity-75 border-l-4 border-l-green-500' : 'card-hover'} ${!isHistory && waitTime > 15 ? 'border-2 border-red-500' : ''} ${!isHistory && waitTime > 10 && waitTime <= 15 ? 'border-2 border-yellow-500' : ''}">
                                    <div class="flex items-center justify-between mb-3">
                                        <div>
                                            <span class="text-xl font-bold">#${order.id.toString().slice(-4)}</span>
                                            <span class="ml-2 px-2 py-1 rounded-full text-xs ${order.type === 'table' ? 'bg-purple-500' : 'bg-blue-500'}">
                                                ${order.type === 'table' ? `Mesa ${order.tableId}` : 'Mostrador'}
                                            </span>
                                        </div>

        function updateOrderStatus(orderId, newStatus) {
            const order = state.orders.find(o => o.id === orderId);
            if (order) {
                order.status = newStatus;
                order.statusUpdatedAt = new Date().toISOString(); // Importante para saber cuándo se terminó
                order.statusUpdatedBy = currentUser.id;

                if (newStatus === 'ready') {
                    addNotification('success', `✅ Pedido #${orderId.toString().slice(-4)} listo para entregar`, ['cashier', 'waiter']);
                }

                if (newStatus === 'delivered' && order.type === 'table') {
                    const table = state.tables.find(t => t.id === order.tableId);
                    if (table) table.status = 'free';
                }

                logActivity('ORDER_STATUS', `Pedido #${orderId.toString().slice(-4)} cambió a ${newStatus}`);
                saveToStorage();
                showToast(`Pedido actualizado a: ${getStatusLabel(newStatus)}`, 'success');
            }
        }

            const productsSummary = Object.entries(productCounts).sort((a, b) => b[1] - a[1]);

                            </div>

                    <div class="grid grid-cols-2 gap-3 pt-2 shrink-0">
                        <button onclick="closeModal()" class="py-3.5 rounded-xl bg-white/5 hover:bg-white/10 transition font-medium">Cancelar</button>

                            📤 Enviar Cierre
                        </button>
                    </div>
                </div>
            `;
            modal.classList.remove('hidden');
        }

        function sendKitchenReport() {
            const notes = document.getElementById('kitchenNotes').value.trim();
            const today = new Date().toDateString();
            const todayOrders = state.orders.filter(o => new Date(o.createdAt).toDateString() === today && o.status !== 'cancelled');
            
            // Asegurarnos de que exista el array de reportes en el state
            if (!state.kitchenReports) state.kitchenReports = [];

            const report = {
                id: Date.now(),
                date: new Date().toISOString(),
                createdBy: currentUser.id,
                createdByName: currentUser.name,
                totalOrders: todayOrders.length,
                notes: notes
            };

            state.kitchenReports.push(report);
            
            // 1. Notificamos directamente al Admin (aparecerá en la campanita)
            addNotification('info', `👨‍🍳 Reporte de cocina enviado por ${currentUser.name}. Pedidos: ${todayOrders.length}. ${notes ? '⚠️ Tiene notas.' : ''}`, ['admin']);
            
            // 2. Queda guardado en la Actividad Global del sistema
            logActivity('KITCHEN_REPORT', `Reporte de cierre de cocina enviado. ${todayOrders.length} pedidos. Notas: ${notes || 'Ninguna'}`);
            
            saveToStorage();
            showToast('Reporte enviado correctamente a administración', 'success');
            closeModal();
        }

        function sendTableOrder(tableId) {
            if (currentCart.length === 0) return;

            const table = state.tables.find(t => t.id === tableId);
            const orderId = Date.now();
            const total = calculateCartTotal();

            const order = {
                id: orderId,
                type: 'table',
                tableId,
                items: [...currentCart],
                total,
                status: 'pending',
                paymentStatus: 'pending',
                createdAt: new Date().toISOString(),
                createdBy: currentUser.id,
                waiterName: currentUser.name
            };

            state.orders.push(order);
            table.status = 'occupied';

            logActivity('ORDER_CREATE', `Pedido #${orderId} creado para ${table.name}`);
            addNotification('info', `🍕 Nuevo pedido #${orderId.toString().slice(-4)} de ${table.name}`, ['kitchen']);
            
            saveToStorage();
            showToast('Pedido enviado a cocina', 'success');
            
            currentCart = [];
            closeModal();
            renderWaiter(document.getElementById('contentArea'));
        }

        function updateUser(userId) {
            const user = state.users.find(u => u.id === userId);
            const newName = document.getElementById('editUserName').value.trim();
            const newUsername = document.getElementById('editUserUsername').value.trim().toLowerCase();
            const newPassword = document.getElementById('editUserPassword').value;

            // Validaciones
            if (!newName || !newUsername) {
                showToast('El nombre y el usuario no pueden estar vacíos', 'warning');
                return;
            }

            // Evitar que se duplique el nombre de usuario de login
            if (state.users.some(u => u.username === newUsername && u.id !== userId)) {
                showToast('El nombre de usuario ya está en uso', 'error');
                return;
            }

            // Actualizar datos
            user.name = newName;
            user.username = newUsername;
            
            if (newPassword) {
                user.password = newPassword;
            }

            if (user.id !== currentUser.id) {
                user.role = document.getElementById('editUserRole').value;
            }

            // ⚠️ FIX CLAVE: Si modificas tu propio usuario, actualizamos la sesión local
            if (user.id === currentUser.id) {
                currentUser = { ...user };
                localStorage.setItem('currentUser', JSON.stringify(currentUser));
                document.getElementById('userName').textContent = currentUser.name; // Actualiza el header
            }

            logActivity('USER_UPDATE', `Usuario actualizado: ${user.name}`);
            saveToStorage();
            showToast('Usuario actualizado', 'success');
            closeModal();
            renderUsers(document.getElementById('contentArea'));
        }

                        </div>
                    </div>
                </div>
            `;
            modal.classList.remove('hidden');
        }

        function openCashRegister() {
            const initialAmount = parseFloat(document.getElementById('initialAmount').value) || 0;
            
            state.cashRegister = {
                isOpen: true,
                openedBy: currentUser.id,
                openedAt: new Date().toISOString(),
                initialAmount,
                movements: [{
                    type: 'open',
                    amount: initialAmount,
                    timestamp: new Date().toISOString()
                }]
            };

            logActivity('CASH_OPEN', `Caja abierta con fondo de $${initialAmount}`);
            saveToStorage();
            showToast('Caja abierta correctamente', 'success');
            closeModal();
            renderCashRegister(document.getElementById('contentArea'));
        }

        function showCloseCashModal() {
            const cr = state.cashRegister;
            const cashSales = cr.movements.filter(m => m.type === 'sale' && m.paymentMethod === 'cash')
                .reduce((sum, m) => sum + m.amount, 0);
            const expectedCash = cr.initialAmount + cashSales;

            const modal = document.getElementById('modalContainer');
            modal.innerHTML = `
                <div class="glass rounded-2xl p-6 w-full max-w-md animate-slideIn">
                    <h3 class="text-xl font-bold mb-4">🔒 Corte de Caja</h3>
                    <div class="space-y-4">
                        <div class="p-4 rounded-xl bg-white/5">
                            <p class="text-sm text-gray-400">Efectivo esperado en caja:</p>
                            <p class="text-2xl font-bold text-pizza-yellow">$${expectedCash.toLocaleString()}</p>
                        </div>
                        <div>
                            <label class="block text-sm mb-2">Efectivo contado</label>
                            <input type="number" id="countedCash" class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-xl text-xl" 
                                placeholder="0" oninput="calculateDifference(${expectedCash})">
                        </div>
                        <div id="differenceDisplay" class="p-4 rounded-xl bg-white/5 hidden">
                            <p class="text-sm text-gray-400">Diferencia:</p>
                            <p id="differenceAmount" class="text-xl font-bold"></p>
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <button onclick="closeModal()" class="py-3 rounded-xl bg-white/10 hover:bg-white/20 transition">Cancelar</button>
                            <button onclick="closeCashRegister(${expectedCash})" class="btn-primary py-3 rounded-xl">Cerrar Caja</button>
                        </div>
                    </div>
                </div>
            `;
            modal.classList.remove('hidden');
        }

        function calculateDifference(expected) {
            const counted = parseFloat(document.getElementById('countedCash').value) || 0;
            const diff = counted - expected;
            const display = document.getElementById('differenceDisplay');
            const amount = document.getElementById('differenceAmount');

            display.classList.remove('hidden');
            amount.textContent = `$${diff >= 0 ? '+' : ''}${diff.toLocaleString()}`;
            amount.className = `text-xl font-bold ${diff >= 0 ? 'text-green-400' : 'text-red-400'}`;
        }

        function closeCashRegister(expected) {
            const counted = parseFloat(document.getElementById('countedCash').value) || 0;
            const difference = counted - expected;

            state.cashRegister.movements.push({
                type: 'close',
                amount: counted,
                expected,
                difference,
                timestamp: new Date().toISOString()
            });

            logActivity('CASH_CLOSE', `Caja cerrada. Esperado: $${expected}, Contado: $${counted}, Diferencia: $${difference}`);
            
            // Reset cash register
            state.cashRegister.isOpen = false;
            
            saveToStorage();
            showToast(`Caja cerrada. Diferencia: $${difference}`, difference === 0 ? 'success' : 'warning');
            closeModal();
            renderCashRegister(document.getElementById('contentArea'));
        }

        // ==================== ORDERS MODULE ====================
        function renderOrders(container) {
            const activeOrders = state.orders.filter(o => o.status !== 'cancelled')
                .sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

            container.innerHTML = `
                <div class="animate-slideIn">
                    <h2 class="text-2xl font-bold mb-6 flex items-center gap-3">📋 Pedidos</h2>
                    
                    <div class="space-y-4">
                        ${activeOrders.slice(0, 30).map(order => `
                            <div class="glass rounded-xl p-4">
                                <div class="flex items-center justify-between mb-3">
                                    <div class="flex items-center gap-3">
                                        <span class="text-xl font-bold">#${order.id.toString().slice(-4)}</span>
                                        <span class="px-2 py-1 rounded-full text-xs ${order.type === 'table' ? 'bg-purple-500' : 'bg-blue-500'}">
                                            ${order.type === 'table' ? `Mesa ${order.tableId}` : 'Mostrador'}
                                        </span>
                                        <span class="px-2 py-1 rounded-full text-xs ${getStatusClass(order.status)}">${getStatusLabel(order.status)}</span>
                                    </div>
                                    <div class="text-right">
                                        <p class="font-bold text-pizza-yellow">$${order.total.toLocaleString()}</p>
                                        <p class="text-xs text-gray-400">${new Date(order.createdAt).toLocaleString('es-MX')}</p>
                                    </div>
                                </div>
                                <div class="flex flex-wrap gap-2 text-sm text-gray-400">
                                    ${order.items.map(i => `<span class="px-2 py-1 rounded bg-white/5">${i.quantity}x ${i.name}</span>`).join('')}
                                </div>
                            </div>
                        `).join('') || '<p class="text-gray-400 text-center py-8">Sin pedidos registrados</p>'}
                    </div>
                </div>
            `;
        }

        // ==================== REPORTS MODULE ====================
        function renderReports(container) {
            const today = new Date().toDateString();
            const thisMonth = new Date().getMonth();
            const thisYear = new Date().getFullYear();

            const todaySales = state.sales.filter(s => new Date(s.timestamp).toDateString() === today);
            const monthSales = state.sales.filter(s => {
                const d = new Date(s.timestamp);
                return d.getMonth() === thisMonth && d.getFullYear() === thisYear;
            });

            const todayTotal = todaySales.reduce((sum, s) => sum + s.total, 0);
            const monthTotal = monthSales.reduce((sum, s) => sum + s.total, 0);
            const todayOrders = todaySales.length;
            const monthOrders = monthSales.length;
            const avgTicket = todayOrders > 0 ? todayTotal / todayOrders : 0;

            // Top products
            const productSales = {};
            state.sales.forEach(sale => {
                sale.items.forEach(item => {
                    if (!productSales[item.name]) productSales[item.name] = { qty: 0, total: 0 };
                    productSales[item.name].qty += item.quantity;
                    productSales[item.name].total += item.price * item.quantity;
                });
            });
            const topProducts = Object.entries(productSales)
                .sort((a, b) => b[1].qty - a[1].qty)
                .slice(0, 5);

            container.innerHTML = `
                <div class="animate-slideIn">
                    <h2 class="text-2xl font-bold mb-6 flex items-center gap-3">📈 Reportes</h2>

                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
                        <div class="glass rounded-2xl p-5">
                            <p class="text-gray-400 text-sm mb-1">Ventas Hoy</p>
                            <p class="text-3xl font-bold text-green-400">$${todayTotal.toLocaleString()}</p>
                            <p class="text-xs text-gray-500">${todayOrders} transacciones</p>
                        </div>
                        <div class="glass rounded-2xl p-5">
                            <p class="text-gray-400 text-sm mb-1">Ventas del Mes</p>
                            <p class="text-3xl font-bold text-blue-400">$${monthTotal.toLocaleString()}</p>
                            <p class="text-xs text-gray-500">${monthOrders} transacciones</p>
                        </div>
                        <div class="glass rounded-2xl p-5">
                            <p class="text-gray-400 text-sm mb-1">Ticket Promedio (hoy)</p>
                            <p class="text-3xl font-bold text-purple-400">$${avgTicket.toFixed(0)}</p>
                        </div>
                        <div class="glass rounded-2xl p-5">
                            <p class="text-gray-400 text-sm mb-1">Productos Vendidos (hoy)</p>
                            <p class="text-3xl font-bold text-pizza-yellow">${todaySales.reduce((sum, s) => sum + s.items.reduce((is, i) => is + i.quantity, 0), 0)}</p>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <div class="glass rounded-2xl p-5">
                            <h3 class="font-bold mb-4">🏆 Productos Más Vendidos</h3>
                            <div class="space-y-3">
                                ${topProducts.map(([name, data], i) => `
                                    <div class="flex items-center justify-between p-3 rounded-xl bg-white/5">
                                        <div class="flex items-center gap-3">
                                            <span class="text-2xl">${['🥇', '🥈', '🥉', '4️⃣', '5️⃣'][i]}</span>
                                            <span class="font-medium">${name}</span>
                                        </div>
                                        <div class="text-right">
                                            <p class="font-bold">${data.qty} vendidos</p>
                                            <p class="text-sm text-gray-400">$${data.total.toLocaleString()}</p>
                                        </div>
                                    </div>
                                `).join('') || '<p class="text-gray-400 text-center py-4">Sin datos</p>'}
                            </div>
                        </div>

                        <div class="glass rounded-2xl p-5">
                            <h3 class="font-bold mb-4">📜 Actividad Reciente</h3>
                            <div class="space-y-2 max-h-80 overflow-auto scrollbar-thin">
                                ${state.activityLog.slice(-20).reverse().map(log => `
                                    <div class="p-3 rounded-xl bg-white/5 text-sm">
                                        <div class="flex justify-between">
                                            <span class="font-medium">${log.action}</span>
                                            <span class="text-gray-400">${new Date(log.timestamp).toLocaleTimeString('es-MX')}</span>
                                        </div>
                                        <p class="text-gray-400 text-xs">${log.details}</p>
                                        <p class="text-gray-500 text-xs">Por: ${log.userName}</p>
                                    </div>
                                `).join('') || '<p class="text-gray-400 text-center py-4">Sin actividad</p>'}
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        // ==================== SETTINGS MODULE ====================
        function renderSettings(container) {
            container.innerHTML = `
                <div class="animate-slideIn">
                    <h2 class="text-2xl font-bold mb-6 flex items-center gap-3">⚙️ Configuración</h2>

                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <div class="glass rounded-2xl p-6">
                            <h3 class="font-bold mb-4">💾 Gestión de Datos</h3>
                            <div class="space-y-3">
                                <button onclick="exportData()" class="w-full py-3 rounded-xl bg-blue-500 hover:bg-blue-600 transition flex items-center justify-center gap-2">
                                    📥 Exportar Datos (JSON)
                                </button>
                                <button onclick="showImportModal()" class="w-full py-3 rounded-xl bg-green-500 hover:bg-green-600 transition flex items-center justify-center gap-2">
                                    📤 Importar Datos a Firebase
                                </button>
                                <button onclick="confirmResetData()" class="w-full py-3 rounded-xl bg-red-500 hover:bg-red-600 transition flex items-center justify-center gap-2">
                                    🗑️ Restaurar Datos Predeterminados
                                </button>
                            </div>
                        </div>

                        <div class="glass rounded-2xl p-6">
                            <h3 class="font-bold mb-4">ℹ️ Información del Sistema</h3>
                            <div class="space-y-3 text-sm">
                                <div class="flex justify-between p-3 rounded-xl bg-white/5">
                                    <span>Base de Datos:</span>
                                    <span class="font-medium text-pizza-yellow">Cloud Firestore (En Vivo)</span>
                                </div>
                                <div class="flex justify-between p-3 rounded-xl bg-white/5">
                                    <span>Usuarios registrados:</span>
                                    <span class="font-medium">${state.users.length}</span>
                                </div>
                                <div class="flex justify-between p-3 rounded-xl bg-white/5">
                                    <span>Productos:</span>
                                    <span class="font-medium">${state.products.length}</span>
                                </div>
                                <div class="flex justify-between p-3 rounded-xl bg-white/5">
                                    <span>Insumos en inventario:</span>
                                    <span class="font-medium">${state.inventory.length}</span>
                                </div>
                                <div class="flex justify-between p-3 rounded-xl bg-white/5">
                                    <span>Total de ventas:</span>
                                    <span class="font-medium">${state.sales.length}</span>
                                </div>
                            </div>
                        </div>

                        <div class="glass rounded-2xl p-6">
                            <h3 class="font-bold mb-4">🪑 Gestión de Mesas</h3>
                            <div class="space-y-3">
                                ${state.tables.map(t => `
                                    <div class="flex items-center justify-between p-3 rounded-xl bg-white/5">
                                        <span>${t.name} (${t.capacity} personas)</span>
                                        <span class="px-2 py-1 rounded-full text-xs ${t.status === 'occupied' ? 'bg-orange-500' : 'bg-green-500'}">${t.status === 'occupied' ? 'Ocupada' : 'Libre'}</span>
                                    </div>
                                `).join('')}
                                <button onclick="addTable()" class="w-full py-2 rounded-xl bg-white/10 hover:bg-white/20 transition text-sm">
                                    ➕ Agregar Mesa
                                </button>
                            </div>
                        </div>

                        <div class="glass rounded-2xl p-6">
                            <h3 class="font-bold mb-4">📞 Proveedores</h3>
                            <div class="space-y-3 max-h-60 overflow-auto scrollbar-thin">
                                ${state.suppliers.map(s => `
                                    <div class="p-3 rounded-xl bg-white/5">
                                        <p class="font-medium">${s.name}</p>
                                        <p class="text-xs text-gray-400">📞 ${s.contact}</p>
                                        <p class="text-xs text-gray-400">✉️ ${s.email}</p>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function exportData() {
            const dataStr = JSON.stringify(state, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `pizzamanager_backup_${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('Datos exportados correctamente', 'success');
        }

        function showImportModal() {
            const modal = document.getElementById('modalContainer');
            modal.innerHTML = `
                <div class="glass rounded-2xl p-6 w-full max-w-md animate-slideIn">
                    <h3 class="text-xl font-bold mb-4">📤 Importar Datos</h3>
                    <div class="space-y-4">
                        <p class="text-sm text-gray-400">Selecciona un archivo JSON exportado anteriormente. Esto reemplazará todos los datos en la base de datos de Firebase.</p>
                        <input type="file" id="importFile" accept=".json" class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-xl">
                        <div class="grid grid-cols-2 gap-3">
                            <button onclick="closeModal()" class="py-3 rounded-xl bg-white/10 hover:bg-white/20 transition">Cancelar</button>
                            <button onclick="importData()" class="btn-primary py-3 rounded-xl">Importar</button>
                        </div>
                    </div>
                </div>
            `;
            modal.classList.remove('hidden');
        }

        function importData() {
            const file = document.getElementById('importFile').files[0];
            if (!file) {
                showToast('Selecciona un archivo', 'warning');
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const imported = JSON.parse(e.target.result);
                    state = { ...DEFAULT_DATA, ...imported };
                    saveToStorage();
                    showToast('Datos importados a Firebase', 'success');
                    closeModal();
                    renderView(currentView);
                } catch (err) {
                    showToast('Error al importar: archivo inválido', 'error');
                }
            };
            reader.readAsText(file);
        }

        function confirmResetData() {
            const modal = document.getElementById('modalContainer');
            modal.innerHTML = `
                <div class="glass rounded-2xl p-6 w-full max-w-md animate-slideIn">
                    <h3 class="text-xl font-bold mb-4 text-red-400">⚠️ Restaurar Datos</h3>
                    <p class="text-gray-300 mb-4">¿Estás seguro de que quieres restaurar todos los datos a los valores predeterminados? Esta acción eliminará los datos en Firebase.</p>
                    <div class="grid grid-cols-2 gap-3">
                        <button onclick="closeModal()" class="py-3 rounded-xl bg-white/10 hover:bg-white/20 transition">Cancelar</button>
                        <button onclick="resetData()" class="py-3 rounded-xl bg-red-500 hover:bg-red-600 transition">Restaurar</button>
                    </div>
                </div>
            `;
            modal.classList.remove('hidden');
        }

        function resetData() {
            state = JSON.parse(JSON.stringify(DEFAULT_DATA));
            saveToStorage();
            showToast('Datos restaurados correctamente', 'success');
            closeModal();
            renderView(currentView);
        }

        function addTable() {
            const nextNum = state.tables.length + 1;
            state.tables.push({
                id: Date.now(),
                name: `Mesa ${nextNum}`,
                capacity: 4,
                status: 'free'
            });
            saveToStorage();
            showToast('Mesa agregada', 'success');
            renderSettings(document.getElementById('contentArea'));
        }

        // ==================== INITIALIZATION ====================
        document.addEventListener('DOMContentLoaded', async function() {
            // Quitamos el intervalo estático de recarga de cocina ya que usamos Real-time Database listeners
            
            // Cargar de Firebase en vez de localStorage
            await loadFromStorage();
            
            // Remover pantalla de carga y mostrar login/app
            document.getElementById('loadingScreen').classList.add('hidden');
            checkSession();

            // Handle Enter key on login
            document.getElementById('loginPass')?.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') handleLogin();
            });
            document.getElementById('loginUser')?.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') document.getElementById('loginPass').focus();
            });

            // Close notifications panel when clicking outside
            document.addEventListener('click', function(e) {
                const notifPanel = document.getElementById('notifPanel');
                const notifBell = document.getElementById('notificationBell');
                if (notifPanel && notifBell && !notifPanel.contains(e.target) && !notifBell.contains(e.target)) {
                    notifPanel.classList.add('hidden');
                }
            });
        });
    </script>
 </body>
</html>
