                // Conecta en tiempo real con la base de datos de ESA sucursal
                stateUnsubscribe = db.collection('pizzaManager').doc(currentBranch).onSnapshot((doc) => {

                        state = { ...DEFAULT_DATA, ...doc.data() };

                        if (currentUser) {
                            renderView(currentView); // Actualiza la vista completa siempre
                            updateNotificationBadge();
                        }
                    } else {
                        // Si la sucursal es nueva (Ej. Sucursal Centro), la crea automáticamente con los datos por defecto
                        state = JSON.parse(JSON.stringify(DEFAULT_DATA));
                        saveToStorage();
                    }
                    resolve();
                }, (error) => {
                    console.error("Error de Firebase:", error);
                    if (Object.keys(state).length === 0) {
                        state = JSON.parse(JSON.stringify(DEFAULT_DATA));
                    }
                    resolve();
                });
            });
        }

        // ==================== AUTHENTICATION ====================
       // ==================== AUTHENTICATION ====================
       async function handleLogin() {
            const username = document.getElementById('loginUser').value.toLowerCase();
            const password = document.getElementById('loginPass').value;
            const branch = document.getElementById('loginBranch').value;
            const errorDiv = document.getElementById('loginError');
            
            const btn = document.querySelector('button[onclick="handleLogin()"]');
            const originalText = btn.innerHTML;
            btn.innerHTML = '⏳ Conectando a Sucursal...';
            btn.disabled = true;

            try {
                // 1. Buscamos los datos de ESA sucursal en Firebase ANTES de hacer login
                const doc = await db.collection('pizzaManager').doc(branch).get();
                let branchState = doc.exists ? doc.data() : DEFAULT_DATA; // Si es nueva, usa los datos por defecto

                // 2. Verificamos si el usuario existe EN ESA sucursal
                const user = branchState.users.find(u => u.username === username && u.password === password && u.active);

                if (user) {
                    currentUser = user;
                    currentBranch = branch;
                    localStorage.setItem('currentUser', JSON.stringify(user));
                    localStorage.setItem('currentBranch', branch);
                    
                    // 3. Arrancamos la sincronización en vivo de la sucursal
                    await loadFromStorage(branch); 
                    
                    const branchLabel = document.getElementById('headerBranchName');
                    if (branchLabel) branchLabel.textContent = branch === 'sucursal_principal' ? 'Principal' : 'Centro';
                    logActivity('LOGIN', `Usuario ${user.name} inició sesión`);
                    
                    errorDiv.classList.add('hidden');
                    document.getElementById('loginScreen').classList.add('hidden');
                    document.getElementById('mainApp').classList.remove('hidden');
                    initMainApp();
                } else {
                    errorDiv.textContent = 'Usuario o contraseña incorrectos en esta Sucursal';
                    errorDiv.classList.remove('hidden');
                    document.getElementById('loginUser').parentElement.classList.add('animate-shake');
                    setTimeout(() => document.getElementById('loginUser').parentElement.classList.remove('animate-shake'), 500);
                }
            } catch (error) {
                console.error("🔥 Error exacto de Firebase:", error); // Lo mostrará en la consola (F12)
                errorDiv.textContent = 'Error: ' + error.message; // Te lo mostrará en la pantalla roja
                errorDiv.classList.remove('hidden');
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        function handleLogout() {
            logActivity('LOGOUT', `Usuario ${currentUser.name} cerró sesión`);
            currentUser = null;
            localStorage.removeItem('currentUser');
            localStorage.removeItem('currentBranch');
            
            if (stateUnsubscribe) stateUnsubscribe(); // Detener internet de la sucursal actual
            
            document.getElementById('mainApp').classList.add('hidden');
            document.getElementById('loginScreen').classList.remove('hidden');
            document.getElementById('loginUser').value = '';
            document.getElementById('loginPass').value = '';
        }

if (branchLabel) branchLabel.textContent = currentBranch === 'sucursal_principal' ? 'Principal' : 'Centro';

        // ==================== VERIFICACIÓN DE STOCK AUTOMÁTICA ====================
        function checkProductAvailability() {
            let inventoryChanged = false;
            
            state.products.forEach(product => {
                // Solo revisamos los productos que actualmente están activos y tienen receta
                if (product.active && product.ingredients && product.ingredients.length > 0) {
                    let hasStock = true;
                    
                    for (let ing of product.ingredients) {
                        const invItem = state.inventory.find(i => i.id === ing.id);
                        // Si el insumo no existe o el stock bajó a menos de lo que pide 1 receta
                        if (!invItem || invItem.stock < ing.qty) {
                            hasStock = false;
                            break;
                        }
                    }

                    if (!hasStock) {
                        product.active = false; // Oculta el producto
                        inventoryChanged = true;
                        
                        // Enviar alerta roja al sistema
                        addNotification('error', `🚫 ${product.name} agotado (Se ocultó del menú automáticamente).`, ['admin', 'cashier', 'waiter']);
                        logActivity('SYSTEM_AUTO', `Producto ${product.name} desactivado por falta de insumos.`);
                    }
                }
            });

            if (inventoryChanged) {
                saveToStorage();
                // Refrescar la pantalla si el usuario está viendo el menú en ese momento
                if (currentView === 'pos') renderPOS(document.getElementById('contentArea'));
                if (currentView === 'products') renderProducts(document.getElementById('contentArea'));
                
                // Si el modal de la mesa está abierto, lo actualizamos para que desaparezca el producto
                if (!document.getElementById('modalContainer').classList.contains('hidden') && selectedTable) {
                    selectTable(selectedTable); 
                }
            }
        }

        // ==================== VERIFICACIÓN DINÁMICA DE STOCK ====================
        function hasEnoughStock(product) {
            if (!product.ingredients || product.ingredients.length === 0) return true;
            for (let ing of product.ingredients) {
                const invItem = state.inventory.find(i => i.id === ing.id);
                // Si el insumo no existe o el stock es menor a lo que pide la receta
                if (!invItem || invItem.stock < ing.qty) {
                    return false;
                }
            }
            return true;
        }

        function renderPOSProducts(category) {

                return `

        function filterPOSProducts(category) {
            document.querySelectorAll('[id^="cat-"]').forEach(btn => {
                btn.classList.remove('bg-theme-green', 'text-white', 'shadow-md');

        // ==================== VERIFICACIÓN INTELIGENTE DE STOCK EN CARRITO ====================
        function canAddToCart(productId, qtyToAdd) {
            const product = state.products.find(p => p.id === productId);
            if (!product || !product.ingredients || product.ingredients.length === 0) return true;

            // 1. Calculamos cuánto de cada insumo ya está "reservado" en el carrito actual
            const currentUsage = {};
            currentCart.forEach(cartItem => {
                const p = state.products.find(x => x.id === cartItem.productId);
                if (p && p.ingredients) {
                    p.ingredients.forEach(ing => {
                        currentUsage[ing.id] = (currentUsage[ing.id] || 0) + (ing.qty * cartItem.quantity);
                    });
                }
            });

            // 2. Verificamos si al intentar agregar la nueva cantidad, superamos el stock real
            for (let ing of product.ingredients) {
                const invItem = state.inventory.find(i => i.id === ing.id);
                if (!invItem) return false;
                
                const alreadyUsedInCart = currentUsage[ing.id] || 0;
                const newlyNeeded = ing.qty * qtyToAdd;
                
                // Redondeamos a 3 decimales para evitar el clásico error de precisión de Javascript
                const totalNeeded = Number((alreadyUsedInCart + newlyNeeded).toFixed(3));
                const availableStock = Number(invItem.stock.toFixed(3));

                if (availableStock < totalNeeded) {
                    const remainingStock = Number((availableStock - alreadyUsedInCart).toFixed(3));
                    showToast(`Stock insuficiente de ${invItem.name}. Solo quedan para ${remainingStock} ${invItem.unit} disponibles.`, 'error');
                    return false;
                }
            }
            return true;
        }

        function addToCart(productId) {
            const product = state.products.find(p => p.id === productId);
            if (!product) return;

            // 🚫 BLOQUEO: Pregunta si los ingredientes alcanzan antes de agregar
            if (!canAddToCart(productId, 1)) {
                return; // Se cancela la acción si no hay stock
            }

            const existing = currentCart.find(item => item.productId === productId);
            if (existing) {
                existing.quantity++;
            } else {
                currentCart.push({ productId, name: product.name, price: product.price, quantity: 1 });
            }
            updateCartDisplay();
        }

        function removeFromCart(productId) {
            currentCart = currentCart.filter(item => item.productId !== productId);
            updateCartDisplay();
        }

        function updateCartItemQty(productId, delta) {
            const item = currentCart.find(i => i.productId === productId);
            if (item) {
                // 🚫 BLOQUEO: Si el usuario presiona "+1", verificamos el stock primero
                if (delta > 0 && !canAddToCart(productId, delta)) {
                    return; // Se cancela la acción si no hay stock
                }

                item.quantity += delta;
                if (item.quantity <= 0) {
                    removeFromCart(productId);
                } else {
                    updateCartDisplay();
                }
            }
        }
        function clearCart() {
            currentCart = [];
            updateCartDisplay();
        }

        function renderCartItems() {
            if (currentCart.length === 0) {
                return '<p class="text-theme-textMuted text-center py-8">El carrito está vacío</p>';
            }
            return currentCart.map(item => `
                <div class="flex items-center justify-between p-3 rounded-xl bg-white shadow-sm border border-theme-beige">
                    <div class="flex-1 pr-2">
                        <p class="font-bold text-sm text-theme-text line-clamp-1">${item.name}</p>
                        <p class="text-theme-greenDark font-bold text-sm">$${item.price} c/u</p>
                    </div>
                    <div class="flex items-center gap-2 bg-theme-bg p-1 rounded-lg border border-theme-beige">
                        <button onclick="updateCartItemQty(${item.productId}, -1)" class="w-7 h-7 rounded-md bg-white hover:bg-theme-beige transition text-theme-text font-bold">-</button>
                        <span class="w-6 text-center font-bold">${item.quantity}</span>
                        <button onclick="updateCartItemQty(${item.productId}, 1)" class="w-7 h-7 rounded-md bg-white hover:bg-theme-beige transition text-theme-text font-bold">+</button>
                    </div>
                </div>
            `).join('');
        }

        function calculateCartTotal() {
            return currentCart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
        }

        function updateCartDisplay() {
    const cartItemsEl = document.getElementById('cartItems');
    const subtotalEl = document.getElementById('cartSubtotal');
    const totalEl = document.getElementById('cartTotal');
    
    // 1. Buscamos los botones de pago por su nuevo ID
    const btnCash = document.getElementById('btnPayCash');
    const btnTransfer = document.getElementById('btnPayTransfer');

    if (cartItemsEl) cartItemsEl.innerHTML = renderCartItems();
    const total = calculateCartTotal();
    if (subtotalEl) subtotalEl.textContent = `$${total.toLocaleString()}`;
    if (totalEl) totalEl.textContent = `$${total.toLocaleString()}`;

    // 2. Comprobamos si hay productos y actualizamos los botones
    const hasItems = currentCart.length > 0;
    if (btnCash) btnCash.disabled = !hasItems;
    if (btnTransfer) btnTransfer.disabled = !hasItems;
}

        function processPayment(method) {
            if (currentCart.length === 0) {
                showToast('El carrito está vacío', 'warning');
                return;
            }

            if (!state.cashRegister.isOpen && currentUser.role !== 'admin') {
                showToast('La caja no está abierta', 'error');
                return;
            }

            const total = calculateCartTotal();

            if (method === 'cash') {
                showCashPaymentModal(total);
            } else {
                completeSale(method, total, 0);
            }
        }

        function showCashPaymentModal(total) {
            const modal = document.getElementById('modalContainer');
            modal.innerHTML = `
                <div class="glass bg-white/90 rounded-3xl p-6 w-full max-w-md animate-slideIn border-2 border-white shadow-2xl">
                    <h3 class="text-xl font-bold mb-4 flex items-center gap-2 text-theme-greenDark">💵 Pago en Efectivo</h3>

                        <div class="text-center p-4 rounded-xl bg-theme-bg border border-theme-beige">
                            <p class="text-sm text-theme-textMuted font-medium">Total a pagar</p>
                            <p class="text-4xl font-extrabold text-theme-greenDark mt-1">$${total.toLocaleString()}</p>
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-2 text-theme-text">Cantidad recibida</label>
                            <input type="number" id="cashReceived" class="w-full px-4 py-3 bg-white border-2 border-theme-beige rounded-xl text-2xl text-center focus:outline-none focus:border-theme-green font-bold text-theme-text" 
                                placeholder="0" oninput="calculateChange(${total})">
                        </div>

                            <p class="text-sm text-green-700 font-medium">Su Cambio</p>

                            <button onclick="completeCashPayment(${total})" id="confirmPaymentBtn" class="btn-primary py-3 rounded-xl font-bold shadow-md" disabled>Confirmar Pago</button>
                        </div>
                    </div>
                </div>
            `;
            modal.classList.remove('hidden');
            // Auto focus for faster typing
            setTimeout(() => document.getElementById('cashReceived').focus(), 100);
        }

        function calculateChange(total) {
            const received = parseFloat(document.getElementById('cashReceived').value) || 0;
            const change = received - total;
            const changeDisplay = document.getElementById('changeDisplay');
            const changeAmount = document.getElementById('changeAmount');
            const confirmBtn = document.getElementById('confirmPaymentBtn');

            if (received >= total) {
                changeDisplay.classList.remove('hidden');
                changeAmount.textContent = change.toLocaleString();
                confirmBtn.disabled = false;
            } else {
                changeDisplay.classList.add('hidden');
                confirmBtn.disabled = true;
            }
        }

        
        function completeCashPayment(total) {
            const received = parseFloat(document.getElementById('cashReceived').value) || 0;
            const change = received - total;
            completeSale('cash', total, change);
            // Ya no llamamos a closeModal() aquí porque completeSale llamará a showReceipt()
        }

        function completeSale(paymentMethod, total, change) {
            const orderId = Date.now();
            const order = {
                id: orderId,
                type: 'counter',
                items: [...currentCart],
                total,
                status: 'pending',
                paymentMethod,
                paymentStatus: 'paid',
                createdAt: new Date().toISOString(),
                createdBy: currentUser.id,
                tableId: null
            };

            state.orders.push(order);

            const sale = {
                id: Date.now(),
                orderId,
                items: [...currentCart],
                subtotal: total,
                total,
                paymentMethod,
                cashReceived: paymentMethod === 'cash' ? total + change : null,
                change: paymentMethod === 'cash' ? change : null,
                timestamp: new Date().toISOString(),
                cashierId: currentUser.id,
                cashierName: currentUser.name
            };

            state.sales.push(sale);

            // Descontar inventario
            currentCart.forEach(cartItem => {
                const product = state.products.find(p => p.id === cartItem.productId);
                if (product && product.ingredients) {
                    product.ingredients.forEach(ing => {
                        const invItem = state.inventory.find(i => i.id === ing.id);
                        if (invItem) {
                            invItem.stock -= ing.qty * cartItem.quantity;
                            if (invItem.stock <= invItem.minStock) {
                                addNotification('warning', `⚠️ Stock bajo: ${invItem.name}`, ['admin', 'cashier']);
                            }
                        }
                    });
                }
            });

            // ---> NUEVO: Verificar si los productos se quedaron sin ingredientes <---
            checkProductAvailability();

            if (state.cashRegister.isOpen) {
                state.cashRegister.movements.push({
                    type: 'sale',
                    amount: total,
                    paymentMethod,
                    orderId,
                    timestamp: new Date().toISOString()
                });
            }

            logActivity('SALE', `Venta #${orderId.toString().slice(-4)} por $${total} - ${paymentMethod}`);
            addNotification('info', `🍕 Nuevo pedido #${orderId.toString().slice(-4)}`, ['kitchen']);

            saveToStorage();
            showToast(`Venta completada - Ticket #${orderId.toString().slice(-4)}`, 'success');
            showReceipt(sale);

            currentCart = [];
            updateCartDisplay();
        }

        // ==================== KITCHEN MODULE ====================
        // ==================== KITCHEN MODULE ====================
        let currentKitchenTab = 'active';

        function renderKitchen(container, tab = currentKitchenTab) {
            currentKitchenTab = tab;

            const pendingOrders = state.orders.filter(o => o.status !== 'delivered' && o.status !== 'cancelled')
                .sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt));

            const sevenDaysAgo = new Date();
            sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 7);
            sevenDaysAgo.setHours(0, 0, 0, 0);

            const historyOrders = state.orders.filter(o => {
                const isHistoryStatus = ['delivered', 'ready', 'cancelled'].includes(o.status);
                const isRecent = new Date(o.createdAt) >= sevenDaysAgo;
                return isHistoryStatus && isRecent;
            }).sort((a, b) => new Date(b.statusUpdatedAt || b.createdAt) - new Date(a.statusUpdatedAt || a.createdAt));

            const groupedHistory = {};
            historyOrders.forEach(o => {
                const dateObj = new Date(o.statusUpdatedAt || o.createdAt);
                const dateLabel = dateObj.toLocaleDateString('es-MX', { weekday: 'long', day: '2-digit', month: 'short', year: 'numeric' });
                const sortKey = dateObj.toLocaleDateString('en-CA');

                if (!groupedHistory[sortKey]) {
                    groupedHistory[sortKey] = {
                        label: dateLabel,
                        orders: []
                    };
                }
                groupedHistory[sortKey].orders.push(o);
            });

            const sortedDateKeys = Object.keys(groupedHistory).sort((a, b) => new Date(b) - new Date(a));

            container.innerHTML = `
                <div class="animate-slideIn h-full flex flex-col">
                    <div class="flex flex-col md:flex-row items-start md:items-center justify-between mb-6 gap-4 shrink-0">
                        <div class="flex flex-col md:flex-row items-start md:items-center gap-4">
                            <h2 class="text-2xl font-bold flex items-center gap-3 text-theme-greenDark">👨‍🍳 Cocina</h2>
                            
                            <div class="flex bg-white/60 p-1 rounded-xl border border-white">
                                <button onclick="renderKitchen(document.getElementById('contentArea'), 'active')" 
                                    class="${tab === 'active' ? 'bg-theme-green text-white shadow-md' : 'text-theme-textMuted hover:bg-white/50'} px-4 py-2 rounded-lg text-sm transition font-bold">
                                    🔥 Activos (${pendingOrders.length})
                                </button>
                                <button onclick="renderKitchen(document.getElementById('contentArea'), 'history')" 
                                    class="${tab === 'history' ? 'bg-theme-green text-white shadow-md' : 'text-theme-textMuted hover:bg-white/50'} px-4 py-2 rounded-lg text-sm transition font-bold">
                                    📅 Historial Semanal
                                </button>
                            </div>
                        </div>
                        
                        <button onclick="showKitchenReportModal()" class="btn-primary px-5 py-2.5 rounded-xl flex items-center gap-2 text-sm font-bold shadow-md">
                            📝 Reporte del Día
                        </button>
                    </div>

                    <div class="overflow-auto pb-4 scrollbar-thin flex-1 pr-2">
                        ${tab === 'active' ? renderActiveOrders(pendingOrders) : renderWeeklyHistory(groupedHistory, sortedDateKeys)}
                    </div>
                </div>
            `;
        }

        function renderActiveOrders(orders) {
            if (orders.length === 0) return '<div class="h-full flex items-center justify-center"><p class="text-theme-textMuted py-12 text-xl font-medium">🎉 ¡La cocina está al día!</p></div>';

            return `
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
                    ${orders.map(order => renderOrderCard(order, false)).join('')}
                </div>
            `;
        }

        function renderWeeklyHistory(groupedHistory, sortedKeys) {
            if (sortedKeys.length === 0) return '<div class="h-full flex items-center justify-center"><p class="text-theme-textMuted py-12 text-xl font-medium">No hay pedidos registrados en los últimos 7 días.</p></div>';

            return `
                <div class="space-y-8">
                    ${sortedKeys.map(dateKey => `
                        <div class="bg-white/60 rounded-2xl p-5 border border-white animate-slideIn shadow-sm">
                            <h3 class="text-lg font-bold text-theme-greenDark mb-4 border-b border-theme-beige pb-3 capitalize flex items-center gap-3">
                                📅 ${groupedHistory[dateKey].label}
                                <span class="text-xs text-white bg-theme-green px-3 py-1 rounded-full font-bold shadow-sm">
                                    ${groupedHistory[dateKey].orders.length} pedidos
                                </span>
                            </h3>
                            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
                                ${groupedHistory[dateKey].orders.map(order => renderOrderCard(order, true)).join('')}
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function renderOrderCard(order, isHistory) {
            const endTime = order.statusUpdatedAt ? new Date(order.statusUpdatedAt) : new Date();
            const waitTime = Math.floor((endTime - new Date(order.createdAt)) / 60000);

            return `
                <div class="bg-white rounded-2xl p-4 flex flex-col border border-white shadow-sm ${isHistory ? 'opacity-80 border-l-4 border-l-green-400 bg-theme-bg' : 'card-hover'} ${!isHistory && waitTime > 15 ? 'border-2 border-red-400 shadow-[0_0_15px_rgba(239,68,68,0.2)]' : ''} ${!isHistory && waitTime > 10 && waitTime <= 15 ? 'border-2 border-yellow-400' : ''}">
                    <div class="flex items-center justify-between mb-3">

        function updateOrderStatus(orderId, newStatus) {
            const order = state.orders.find(o => o.id === orderId);
            if (!order) return;

            // Actualizamos el estado de la orden
            order.status = newStatus;

            // 👇 MAGIA: SI SE ENTREGA O CANCELA, LIBERAMOS LA MESA 👇
            if (newStatus === 'delivered' || newStatus === 'cancelled') {
                if (order.tableId) {
                    const table = state.tables.find(t => t.id === order.tableId);
                    if (table) {
                        table.status = 'available'; // La mesa vuelve a estar Verde/Disponible
                    }
                }
            }

            saveToStorage();
            
            // Usamos tu función getStatusLabel si existe, sino un texto por defecto
            const statusText = typeof getStatusLabel === 'function' ? getStatusLabel(newStatus) : newStatus;
            showToast(`✅ Pedido marcado como: ${statusText}`, 'success');

            // RECARGA INTELIGENTE DE PANTALLAS (Para que se vea el cambio al instante)
            const contentArea = document.getElementById('contentArea');
            
            if (currentUser.role === 'cocina') {
                if (typeof renderKitchen === 'function') renderKitchen(contentArea);
            } else {
                // Si es mesero o admin, recargamos la vista que tengan abierta
                if (typeof renderWaiter === 'function') renderWaiter(contentArea);
                else if (typeof renderTables === 'function') renderTables(contentArea);
                else if (typeof renderWaiterDashboard === 'function') renderWaiterDashboard(contentArea);
            }
        }

        function sendTableOrder(tableId) {
            try {
                if (currentCart.length === 0) {
                    showToast('Agrega al menos un producto', 'warning');
                    return;
                }

                const table = state.tables.find(t => t.id === tableId);
                let order = state.orders.find(o => o.tableId === tableId && o.status !== 'delivered' && o.status !== 'cancelled');

                
               // Si no hay orden previa, creamos una nueva
               if (!order) {
                    order = {
                        id: Date.now(),
                        type: 'table', // 👈 Define que es un pedido de mesa
                        tableId: tableId,
                        tableName: table.name,
                        createdBy: currentUser.id, // 👈 ESTO ES LO QUE BUSCA "MIS PEDIDOS"
                        createdAt: new Date().toISOString(), // 👈 ESTO ES LO QUE USA PARA LA FECHA/HORA
                        userId: currentUser.id,
                        userName: currentUser.name,
                        waiterId: currentUser.id, 
                        waiterName: currentUser.name,
                        items: [],
                        status: 'pending',
                        total: 0,
                        timestamp: new Date().toISOString()
                    };
                    state.orders.push(order);
                }

                // Pasamos los items del carrito temporal a la orden real
                currentCart.forEach(cartItem => {
                    const existing = order.items.find(i => i.productId === cartItem.productId);
                    if (existing) {
                        existing.quantity += cartItem.quantity;
                    } else {
                        order.items.push({ ...cartItem });
                    }
                });

                // Actualizamos el total de la orden y marcamos la mesa como ocupada
                order.total = order.items.reduce((sum, item) => sum + (item.price * item.quantity), 0);
                table.status = 'occupied';

                // Intentamos notificar a cocina de forma segura
                try {
                    if (typeof addNotification === 'function') {
                        addNotification(`Nueva comanda de ${table.name}`, ['cocina', 'admin']);
                    }
                } catch(e) { 
                    console.log("Aviso: No se pudo enviar notificación a cocina", e); 
                }

                // Vaciamos el carrito temporal y guardamos todo en Firebase/Local
                currentCart = [];
                saveToStorage();
                
                // Mensaje de éxito al usuario
                showToast('✅ Orden enviada a cocina', 'success');

                // ==========================================
                // 1. CIERRE FORZADO Y LIMPIO DE LA VENTANA
                // ==========================================
                const modal = document.getElementById('modalContainer');
                if (modal) {
                    modal.classList.add('hidden');
                    modal.innerHTML = ''; // Limpiamos el contenido para que no queden rastros
                }
                
                // ==========================================
                // 2. RECARGA INTELIGENTE DE LA VISTA
                // ==========================================
                const contentArea = document.getElementById('contentArea');
                
                if (typeof renderWaiter === 'function') {
                    renderWaiter(contentArea);
                } else if (typeof renderTables === 'function') {
                    renderTables(contentArea);
                } else if (typeof renderWaiterDashboard === 'function') {
                    renderWaiterDashboard(contentArea);
                } else {
                    // Si el nombre es diferente, pedimos al usuario que recargue tocando el menú
                    showToast('Orden guardada. Haz clic en el menú para actualizar la vista de mesas.', 'info');
                }

            } catch (error) {
                // Si ocurre una falla crítica, mostramos el error sin congelar el sistema
                console.error("Error al enviar a cocina:", error);
                showToast('❌ Error al procesar: ' + error.message, 'error');
                
                // Aseguramos que la ventana se cierre de todos modos
                const modal = document.getElementById('modalContainer');
                if (modal) {
                    modal.classList.add('hidden');
                    modal.innerHTML = '';
                }
            }
        }

        function reprintTicket(saleId) {

        function addInventoryEntry(itemId) {
            const qty = parseFloat(document.getElementById('entryQty').value);
            const notes = document.getElementById('entryNotes').value;

            if (!qty || qty <= 0) {
                showToast('Ingresa una cantidad válida', 'warning');
                return;
            }

            const item = state.inventory.find(i => i.id === itemId);
            item.stock += qty;

            state.inventoryMovements.push({
                id: Date.now(),
                itemId,
                itemName: item.name,
                type: 'entry',
                quantity: qty,
                notes,
                timestamp: new Date().toISOString(),
                userId: currentUser.id,
                userName: currentUser.name
            });

            // ---> NUEVO: Reactivar productos automáticamente <---
            // Si el insumo que acabamos de agregar pertenece a la receta de algún 
            // producto que estaba apagado (🔴), revisamos si ya tiene stock para prenderlo (🟢)
            let reactivatedProducts = [];
            state.products.forEach(p => {
                // Solo revisamos productos apagados que usan este insumo específico
                if (!p.active && p.ingredients && p.ingredients.some(ing => ing.id === itemId)) {
                    if (hasEnoughStock(p)) {
                        p.active = true; // Lo prendemos
                        reactivatedProducts.push(p.name);
                    }
                }
            });

            logActivity('INVENTORY_ENTRY', `Entrada de ${qty} ${item.unit} de ${item.name}`);
            saveToStorage();
            
            showToast(`Entrada registrada: ${qty} ${item.unit} de ${item.name}`, 'success');
            
            // Si el sistema revivió productos, te avisa con otra notificación
            if (reactivatedProducts.length > 0) {
                setTimeout(() => showToast(`Se reactivaron automáticamente: ${reactivatedProducts.join(', ')}`, 'info'), 1500);

// ==================== CONVERTIDOR DE IMAGEN CON COMPRESIÓN ====================
function convertImageToBase64(input) {
    if (input.files && input.files[0]) {
        const file = input.files[0];
        const reader = new FileReader();
        
        reader.onload = function(e) {
            const img = new Image();
            img.onload = function() {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                
                const MAX_WIDTH = 400;
                const MAX_HEIGHT = 400;
                let width = img.width;
                let height = img.height;

                if (width > height) {
                    if (width > MAX_WIDTH) {
                        height *= MAX_WIDTH / width;
                        width = MAX_WIDTH;
                    }
                } else {
                    if (height > MAX_HEIGHT) {
                        width *= MAX_HEIGHT / height;
                        height = MAX_HEIGHT;
                    }
                }

                canvas.width = width;
                canvas.height = height;
                
                ctx.drawImage(img, 0, 0, width, height);

                // Comprime al 70% de calidad en formato JPEG
                const compressedBase64 = canvas.toDataURL('image/jpeg', 0.7);
                
                document.getElementById('hiddenImageBase64').value = compressedBase64;
                showToast('✅ Foto cargada y optimizada', 'success');
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }
}

function addIngredientToRecipe() {
    const select = document.getElementById('recipeIngredientSelect');
    const qtyInput = document.getElementById('recipeIngredientQty');
    const invId = parseInt(select.value);
    const qty = parseFloat(qtyInput.value);

    if (!invId || isNaN(qty) || qty <= 0) {
        showToast('Selecciona insumo y cantidad', 'warning'); return;
    }

    const existing = currentEditIngredients.find(i => i.id === invId);
    if (existing) existing.qty += qty;
    else currentEditIngredients.push({ id: invId, qty });

    select.value = ''; qtyInput.value = '';
    renderRecipeItems();
}

function removeIngredientFromRecipe(index) {
    currentEditIngredients.splice(index, 1);
    renderRecipeItems();
}

        function addIngredientToRecipe() {
            const select = document.getElementById('recipeIngredientSelect');
            const qtyInput = document.getElementById('recipeIngredientQty');
            
            const invId = parseInt(select.value);
            const qty = parseFloat(qtyInput.value);

            if (!invId || isNaN(qty) || qty <= 0) {
                showToast('Selecciona un insumo y una cantidad mayor a 0', 'warning');
                return;
            }

            // Si el insumo ya está en la receta, solo le sumamos la cantidad
            const existing = currentEditIngredients.find(i => i.id === invId);

                existing.qty += qty;

                currentEditIngredients.push({ id: invId, qty: qty });
            }

            select.value = '';
            qtyInput.value = '';
            
            // Actualizamos la vista
            renderRecipeItems();

        // --- Al guardar, aplicamos la receta al producto real ---
        function updateProduct(productId) {
            try {
                const product = state.products.find(p => String(p.id) === String(productId));
                
                if (!product) {
                    showToast('❌ Error: No se encontró el producto.', 'error');
                    return;
                }

                const nameInput = document.getElementById('editProdName');
                const catInput = document.getElementById('editProdCategory');
                const priceInput = document.getElementById('editProdPrice');
                const hiddenImgInput = document.getElementById('hiddenImageBase64');
                const urlInput = document.getElementById('editProdImageUrl');

                if (!nameInput || !priceInput) {
                    showToast('❌ Error: Falta un campo.', 'error');
                    return;
                }

                product.name = nameInput.value.trim();
                product.category = catInput.value;
                product.price = parseFloat(priceInput.value) || product.price;
                
                const imageBase64 = hiddenImgInput ? hiddenImgInput.value : '';
                const imageUrl = urlInput ? urlInput.value.trim() : '';

                showToast('✅ Producto actualizado en todas las sucursales', 'success'); 
                closeModal(); 
                renderProducts(document.getElementById('contentArea'));

        function openCashRegister() {
            const initialAmount = parseFloat(document.getElementById('initialAmount').value) || 0;

            state.cashRegister = {
                isOpen: true,
                openedBy: currentUser.id,
                openedAt: new Date().toISOString(),
                initialAmount,
                movements: [{
                    type: 'open',
                    amount: initialAmount,
                    timestamp: new Date().toISOString()
                }]
            };

            logActivity('CASH_OPEN', `Caja abierta con fondo de $${initialAmount}`);

            showToast('Caja abierta correctamente', 'success');
            closeModal();
            renderCashRegister(document.getElementById('contentArea'));

        function showCloseCashModal() {
            const cr = state.cashRegister;
            const cashSales = cr.movements.filter(m => m.type === 'sale' && m.paymentMethod === 'cash')
                .reduce((sum, m) => sum + m.amount, 0);
            const expectedCash = cr.initialAmount + cashSales;

            const modal = document.getElementById('modalContainer');
            modal.innerHTML = `
                <div class="glass bg-white/90 rounded-3xl p-6 w-full max-w-md animate-slideIn shadow-2xl border-2 border-white">
                    <h3 class="text-xl font-bold mb-4 text-theme-greenDark">🔒 Corte de Caja</h3>

                            <p class="text-3xl font-extrabold text-theme-greenDark mt-1">$${expectedCash.toLocaleString()}</p>

                    </div>
                </div>
            `;
            modal.classList.remove('hidden');

        function calculateDifference(expected) {
            const counted = parseFloat(document.getElementById('countedCash').value) || 0;
            const diff = counted - expected;
            const display = document.getElementById('differenceDisplay');
            const amount = document.getElementById('differenceAmount');

            display.classList.remove('hidden');
            amount.textContent = `${diff >= 0 ? '+' : ''}$${diff.toLocaleString()}`;
            amount.className = `text-2xl font-extrabold mt-1 ${diff === 0 ? 'text-green-600' : 'text-red-600'}`;
        }

        function closeCashRegister(expected) {
            const counted = parseFloat(document.getElementById('countedCash').value) || 0;
            const difference = counted - expected;

            state.cashRegister.movements.push({
                type: 'close',
                amount: counted,
                expected,
                difference,
                timestamp: new Date().toISOString()
            });

            logActivity('CASH_CLOSE', `Caja cerrada. Esperado: $${expected}, Contado: $${counted}, Diferencia: $${difference}`);

            state.cashRegister.isOpen = false;

            saveToStorage();
            showToast(`Caja cerrada. Diferencia: $${difference}`, difference === 0 ? 'success' : 'warning');
            closeModal();
            renderCashRegister(document.getElementById('contentArea'));
        }

        // ==================== EXISTING ORDER PAYMENT LOGIC ====================
        function payExistingOrder(orderId, method) {
            if (!state.cashRegister.isOpen && currentUser.role !== 'admin') {
                showToast('La caja no está abierta', 'error');
                return;
            }

            const order = state.orders.find(o => o.id === orderId);
            if (!order) return;

            if (method === 'cash') {
                showOrderCashModal(order);
            } else {
                processOrderPayment(order, 'transfer', order.total, 0);
            }
        }

        function showOrderCashModal(order) {
            const modal = document.getElementById('modalContainer');
            modal.innerHTML = `
                <div class="glass bg-white/90 rounded-3xl p-5 md:p-6 w-[95%] max-w-md animate-slideIn border-2 border-white shadow-2xl max-h-[90vh] overflow-y-auto scrollbar-thin">
                    <h3 class="text-xl font-bold mb-4 flex items-center gap-2 text-theme-greenDark">💵 Cobrar Pedido #${order.id.toString().slice(-4)}</h3>
                    <div class="space-y-4">
                        <div class="text-center p-4 rounded-xl bg-theme-bg border border-theme-beige">
                            <p class="text-sm text-theme-textMuted font-medium">Total a cobrar</p>
                            <p class="text-4xl font-extrabold text-theme-greenDark mt-1">$${order.total.toLocaleString()}</p>
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-2 text-theme-text">Cantidad recibida</label>
                            <input type="number" id="orderCashReceived" class="w-full px-4 py-3 bg-white border-2 border-theme-beige rounded-xl text-2xl text-center focus:outline-none focus:border-theme-green font-bold text-theme-text" 
                                placeholder="0" oninput="calculateOrderChange(${order.total})">
                        </div>
                        <div id="orderChangeDisplay" class="text-center p-4 rounded-xl bg-green-50 border border-green-200 hidden">
                            <p class="text-sm text-green-700 font-medium">Su Cambio</p>
                            <p class="text-3xl font-extrabold text-green-600 mt-1">$<span id="orderChangeAmount">0</span></p>
                        </div>
                        <div class="grid grid-cols-2 gap-3 pt-2">
                            <button onclick="closeModal()" class="py-3 rounded-xl bg-white hover:bg-theme-beige border border-theme-beige transition font-medium">Cancelar</button>
                            <button onclick="completeOrderCashPayment(${order.id})" id="confirmOrderPaymentBtn" class="btn-primary py-3 rounded-xl font-bold shadow-md" disabled>Confirmar Cobro</button>
                        </div>
                    </div>
                </div>
            `;
            modal.classList.remove('hidden');
            setTimeout(() => document.getElementById('orderCashReceived').focus(), 100);
        }

        function calculateOrderChange(total) {
            const received = parseFloat(document.getElementById('orderCashReceived').value) || 0;
            const change = received - total;
            const changeDisplay = document.getElementById('orderChangeDisplay');
            const changeAmount = document.getElementById('orderChangeAmount');
            const confirmBtn = document.getElementById('confirmOrderPaymentBtn');

            if (received >= total) {
                changeDisplay.classList.remove('hidden');
                changeAmount.textContent = change.toLocaleString();
                confirmBtn.disabled = false;
            } else {
                changeDisplay.classList.add('hidden');
                confirmBtn.disabled = true;
            }
        }

        function completeOrderCashPayment(orderId) {
            const order = state.orders.find(o => o.id === orderId);
            const received = parseFloat(document.getElementById('orderCashReceived').value) || 0;
            const change = received - order.total;
            processOrderPayment(order, 'cash', received, change);
            closeModal();
        }

        function processOrderPayment(order, paymentMethod, cashReceived, change) {
            order.paymentStatus = 'paid';
            order.paymentMethod = paymentMethod;

            const sale = {
                id: Date.now(),
                orderId: order.id,
                items: [...order.items],
                subtotal: order.total,
                total: order.total,
                paymentMethod,
                cashReceived: paymentMethod === 'cash' ? cashReceived : null,
                change: paymentMethod === 'cash' ? change : null,
                timestamp: new Date().toISOString(),
                cashierId: currentUser.id,
                cashierName: currentUser.name
            };

            state.sales.push(sale);

            // Nota: Aquí se eliminó el ciclo que descontaba el inventario, 
            // porque ahora se descuenta desde que el mesero manda la orden.

            if (state.cashRegister.isOpen) {
                state.cashRegister.movements.push({
                    type: 'sale',
                    amount: order.total,
                    paymentMethod,
                    orderId: order.id,
                    timestamp: new Date().toISOString()
                });
            }

            logActivity('SALE_TABLE', `Cobro de pedido de mesa #${order.id.toString().slice(-4)} por $${order.total} - ${paymentMethod}`);
            
            saveToStorage();
            showToast(`Cobro completado exitosamente`, 'success');
            
            // Recargar la vista actual (para que desaparezcan los botones)
            renderView(currentView);
            
            // Mostrar ticket con opción de imprimir
            showReceipt(sale);
        }

        // ==================== REPORTS MODULE ====================
        // ==================== REPORTS MODULE ====================
        function renderReports(container) {
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            
            // Calcular los últimos 7 días para la gráfica
            const last7Days = [...Array(7)].map((_, i) => {
                const d = new Date();
                d.setDate(d.getDate() - (6 - i)); // De más antiguo a hoy
                d.setHours(0, 0, 0, 0);
                return d;
            });

            const chartLabels = last7Days.map(d => d.toLocaleDateString('es-MX', { weekday: 'short', day: 'numeric' }));
            
            // Obtener ventas por día para la gráfica
            const chartData = last7Days.map(date => {
                return state.sales
                    .filter(s => {
                        const saleDate = new Date(s.timestamp);
                        saleDate.setHours(0, 0, 0, 0);
                        return saleDate.getTime() === date.getTime();
                    })
                    .reduce((sum, s) => sum + s.total, 0);
            });

            // Totales de Hoy y Semana
            const todaySales = state.sales.filter(s => {
                const d = new Date(s.timestamp);
                d.setHours(0, 0, 0, 0);
                return d.getTime() === today.getTime();
            });
            const weekSales = state.sales.filter(s => new Date(s.timestamp) >= last7Days[0]);

            const todayTotal = todaySales.reduce((sum, s) => sum + s.total, 0);
            const weekTotal = weekSales.reduce((sum, s) => sum + s.total, 0);

            container.innerHTML = `
                <div class="animate-slideIn">
                    <div class="flex flex-col md:flex-row items-start md:items-center justify-between mb-6 gap-4">
                        <h2 class="text-2xl font-bold flex items-center gap-3 text-theme-greenDark">📈 Estadísticas y Reportes</h2>
                        
                        <div class="flex gap-2 w-full md:w-auto">
                            <button onclick="generateReport('daily')" class="flex-1 md:flex-none btn-primary px-4 py-2.5 rounded-xl text-sm font-bold shadow-md flex items-center justify-center gap-2">
                                📄 Reporte Diario
                            </button>
                            <button onclick="generateReport('weekly')" class="flex-1 md:flex-none bg-blue-500 hover:bg-blue-600 text-white px-4 py-2.5 rounded-xl text-sm font-bold shadow-md flex items-center justify-center gap-2 transition">
                                📅 Reporte Semanal
                            </button>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                        <div class="glass bg-white/60 border border-white rounded-2xl p-6 shadow-sm">
                            <p class="text-theme-textMuted text-sm font-bold mb-1">Ventas del Día (Hoy)</p>
                            <p class="text-4xl font-extrabold text-green-600">$${todayTotal.toLocaleString()}</p>
                            <p class="text-xs text-theme-textMuted font-medium mt-3 bg-theme-bg inline-block px-3 py-1.5 rounded-md border border-theme-beige">${todaySales.length} tickets procesados hoy</p>
                        </div>
                        <div class="glass bg-white/60 border border-white rounded-2xl p-6 shadow-sm">
                            <p class="text-theme-textMuted text-sm font-bold mb-1">Ventas de la Semana (Últimos 7 días)</p>
                            <p class="text-4xl font-extrabold text-blue-600">$${weekTotal.toLocaleString()}</p>
                            <p class="text-xs text-theme-textMuted font-medium mt-3 bg-theme-bg inline-block px-3 py-1.5 rounded-md border border-theme-beige">${weekSales.length} tickets en total</p>
                        </div>
                    </div>

                    <div class="glass bg-white/60 border border-white rounded-2xl p-6 shadow-sm mb-6">
                        <h3 class="font-extrabold text-lg mb-4 text-theme-text border-b border-theme-beige pb-3">📊 Tendencia de Ingresos</h3>
                        <div class="w-full h-72">
                            <canvas id="salesChart"></canvas>
                        </div>
                    </div>
                </div>
            `;

            // Inicializar la gráfica después de inyectar el HTML
            setTimeout(() => {
                const ctx = document.getElementById('salesChart');
                if(ctx) {
                    new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: chartLabels,
                            datasets: [{
                                label: 'Ingresos por día ($)',
                                data: chartData,
                                borderColor: '#7A9E7E',
                                backgroundColor: 'rgba(167, 196, 170, 0.4)',
                                borderWidth: 3,
                                fill: true,
                                tension: 0.3, // Curva suave
                                pointBackgroundColor: '#4A504A',
                                pointRadius: 4
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: {
                                legend: { display: false },
                                tooltip: {
                                    callbacks: {
                                        label: function(context) {
                                            return '$' + context.parsed.y.toLocaleString();
                                        }
                                    }
                                }
                            },
                            scales: {
                                y: { 
                                    beginAtZero: true, 
                                    grid: { color: '#EAE5D9' },
                                    ticks: { callback: function(value) { return '$' + value; } }
                                },
                                x: { grid: { display: false } }
                            }
                        }
                    });
                }
            }, 50);
        }

        function generateReport(type) {
            const today = new Date();
            let filteredSales = [];
            let title = "";
            let dateStr = "";

            if (type === 'daily') {
                filteredSales = state.sales.filter(s => new Date(s.timestamp).toDateString() === today.toDateString());
                title = "Corte de Ventas Diario";
                dateStr = today.toLocaleDateString('es-MX', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

        async function createNewBranch() {
            const nameInput = document.getElementById('newBranchName').value.trim();
            if (!nameInput) {
                showToast('Ingresa un nombre para la sucursal', 'warning');
                return;
            }

            // Mismo formateo de ID
            let cleanName = nameInput.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
            cleanName = cleanName.replace(/[^a-z0-9]/g, '_').replace(/_+/g, '_').replace(/^_|_$/g, '');
            const branchId = 'sucursal_' + cleanName;

            try {
                // 1. Verificamos que no estemos sobreescribiendo una sucursal existente
                const docRef = await db.collection('pizzaManager').doc(branchId).get();
                if (docRef.exists) {
                    showToast('Ese nombre de sucursal ya existe', 'error');
                    return;
                }

                // 2. Preparamos la nueva base de datos limpia pero clonando el MENÚ ACTUAL
                const newEnvironment = JSON.parse(JSON.stringify(DEFAULT_DATA));
                newEnvironment.products = JSON.parse(JSON.stringify(state.products)); 
                
                // Le pasamos solo a los administradores para que puedan acceder
                newEnvironment.users = state.users.filter(u => u.role === 'admin' || u.id === currentUser.id);

                // 3. Subimos la nueva sucursal a la nube
                await db.collection('pizzaManager').doc(branchId).set(newEnvironment);
                
                // 4. Registramos el ID en la matriz de la Sucursal Principal para el Motor de Sincronización
                if (!state.franchiseBranches) {
                    state.franchiseBranches = ['sucursal_centro']; // Metemos la del centro por defecto
                }
                if (!state.franchiseBranches.includes(branchId)) {
                    state.franchiseBranches.push(branchId);
                    saveToStorage();
                }
                
                logActivity('BRANCH_CREATE', `Nueva sucursal desplegada: ${nameInput}`);
                
                // 5. ¡Éxito! Mostrarle al usuario qué hacer ahora.
                showBranchCreatedSuccessModal(nameInput, branchId);
                
            } catch (error) {
                console.error('Error al crear sucursal:', error);
                showToast('Error al crear la base de datos', 'error');
            }
        }

                const centroDoc = await db.collection('pizzaManager').doc('sucursal_centro').get();
                const centroState = centroDoc.exists ? centroDoc.data() : null;

                const todayStr = new Date().toDateString();

                // 3. Cálculos Sucursal Principal (Local)
                const prinSalesToday = state.sales.filter(s => new Date(s.timestamp).toDateString() === todayStr).reduce((sum, s) => sum + s.total, 0);

                const prinLowStock = state.inventory.filter(i => i.stock <= i.minStock).length;

                // 4. Cálculos Sucursal Centro (Remota)
                let centroSalesToday = 0;

                let centroLowStock = 0;

                if (centroState) {
                    centroSalesToday = (centroState.sales || []).filter(s => new Date(s.timestamp).toDateString() === todayStr).reduce((sum, s) => sum + s.total, 0);
                    centroOrdersActive = (centroState.orders || []).filter(o => o.status !== 'delivered' && o.status !== 'cancelled').length;
                    centroLowStock = (centroState.inventory || []).filter(i => i.stock <= i.minStock).length;
                }

                const totalGlobal = prinSalesToday + centroSalesToday;

                // 5. Dibujar la Interfaz Comparativa
                container.innerHTML = `
                    <div class="animate-slideIn">
                        <div class="flex flex-col md:flex-row items-start md:items-center justify-between mb-6 gap-4 border-b border-theme-beige pb-4">
                            <div>
                                <h2 class="text-2xl font-bold flex items-center gap-3 text-theme-greenDark">🌍 Control Global de Franquicia</h2>
                                <p class="text-theme-textMuted text-sm font-medium mt-1">Monitoreo en tiempo real de todas las sucursales activas</p>
                            </div>
                            <div class="bg-theme-green text-white px-5 py-3 rounded-2xl shadow-md text-right">
                                <p class="text-xs font-bold opacity-80 uppercase tracking-wider">Ingresos Globales Hoy</p>
                                <p class="text-3xl font-extrabold">$${totalGlobal.toLocaleString()}</p>
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="glass bg-white/80 border-2 border-theme-green rounded-3xl p-6 shadow-lg relative overflow-hidden">
                                <div class="absolute top-0 left-0 w-full h-2 bg-theme-green"></div>
                                <h3 class="text-xl font-extrabold text-theme-text mb-6 flex items-center gap-2">📍 Sucursal Principal <span class="bg-green-100 text-green-700 text-[10px] px-2 py-1 rounded-md ml-auto">ESTA SUCURSAL</span></h3>
                                
                                <div class="space-y-4">
                                    <div class="flex justify-between items-center p-4 bg-theme-bg rounded-xl border border-theme-beige">
                                        <span class="font-bold text-theme-textMuted flex items-center gap-2">💰 Ventas Hoy</span>
                                        <span class="text-2xl font-extrabold text-green-600">$${prinSalesToday.toLocaleString()}</span>
                                    </div>
                                    <div class="flex justify-between items-center p-4 bg-theme-bg rounded-xl border border-theme-beige">
                                        <span class="font-bold text-theme-textMuted flex items-center gap-2">🔥 Pedidos Activos</span>
                                        <span class="text-xl font-bold text-blue-600">${prinOrdersActive} en curso</span>
                                    </div>
                                    <div class="flex justify-between items-center p-4 ${prinLowStock > 0 ? 'bg-red-50 border-red-200' : 'bg-theme-bg border-theme-beige'} rounded-xl border">
                                        <span class="font-bold ${prinLowStock > 0 ? 'text-red-600' : 'text-theme-textMuted'} flex items-center gap-2">⚠️ Alertas Inventario</span>
                                        <span class="text-lg font-bold ${prinLowStock > 0 ? 'text-red-600' : 'text-theme-text'}">${prinLowStock} insumos bajos</span>
                                    </div>
                                </div>
                            </div>

                            <div class="glass bg-white/60 border border-white rounded-3xl p-6 shadow-md relative overflow-hidden">
                                <div class="absolute top-0 left-0 w-full h-2 bg-blue-400"></div>
                                <h3 class="text-xl font-extrabold text-theme-text mb-6 flex items-center gap-2">🏪 Sucursal Centro ${!centroState ? '<span class="text-red-500 text-sm ml-auto font-medium">Sin datos</span>' : ''}</h3>
                                
                                <div class="space-y-4 ${!centroState ? 'opacity-50 grayscale' : ''}">
                                    <div class="flex justify-between items-center p-4 bg-white rounded-xl shadow-sm border border-theme-beige">
                                        <span class="font-bold text-theme-textMuted flex items-center gap-2">💰 Ventas Hoy</span>
                                        <span class="text-2xl font-extrabold text-blue-600">$${centroSalesToday.toLocaleString()}</span>
                                    </div>
                                    <div class="flex justify-between items-center p-4 bg-white rounded-xl shadow-sm border border-theme-beige">
                                        <span class="font-bold text-theme-textMuted flex items-center gap-2">🔥 Pedidos Activos</span>
                                        <span class="text-xl font-bold text-blue-600">${centroOrdersActive} en curso</span>
                                    </div>
                                    <div class="flex justify-between items-center p-4 ${centroLowStock > 0 ? 'bg-red-50 border-red-200' : 'bg-white border-theme-beige'} rounded-xl shadow-sm border">
                                        <span class="font-bold ${centroLowStock > 0 ? 'text-red-600' : 'text-theme-textMuted'} flex items-center gap-2">⚠️ Alertas Inventario</span>
                                        <span class="text-lg font-bold ${centroLowStock > 0 ? 'text-red-600' : 'text-theme-text'}">${centroLowStock} insumos bajos</span>
                                    </div>
                                </div>
                                <div class="mt-4 text-right">
                                    <button onclick="handleLogout(); setTimeout(() => { document.getElementById('loginBranch').value = 'sucursal_centro'; }, 100);" class="text-xs text-blue-500 font-bold hover:underline">Cambiar a esta sucursal ➡️</button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            } catch (error) {
                console.error("Error cargando Dashboard Global:", error);
                container.innerHTML = `
                    <div class="p-8 text-center">
                        <div class="text-4xl mb-4">❌</div>
                        <h2 class="text-xl font-bold text-red-600">No se pudo contactar con las demás sucursales.</h2>
                        <p class="text-theme-textMuted mt-2">${error.message}</p>
                    </div>
                `;
            }
        }
    </script>
</body>

</html>
